<!DOCTYPE html><html><head><title>Parent Register</title><style>body{font-family:Segoe UI;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center}.card{background:white;padding:40px;border-radius:20px;width:350px}h2{color:#667eea}input{width:100%;padding:12px;margin:10px0;border:1px solid #ddd;border-radius:10px}button{width:100%;padding:12px;background:#667eea;color:white}</style></head><body><div class="card"><h2>Create Account</h2>{% if error %}<p style="color:red">{{ error }}</p>{% endif %}<form method="POST"><input name="username" placeholder="Username"><input type="password" name="password" placeholder="Password"><input name="email" placeholder="Email"><button type="submit">Register</button></form></div></body></html>
