<!DOCTYPE html>
<html>
<head>
    <title>Music Rhythm</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .instruments {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
        }
        .instrument {
            text-align: center;
            cursor: pointer;
        }
        .instrument-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: white;
            transition: 0.1s;
        }
        .instrument:active .instrument-icon {
            transform: scale(0.9);
            background: #ffd700;
        }
        .pattern-area {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
        }
        .pattern-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        .pattern-box {
            width: 60px;
            height: 60px;
            background: #1e3c72;
            border-radius: 10px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }
        .level-info {
            text-align: center;
            font-size: 1.2em;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Music Rhythm</h1>
        
        <div class="level-info">
            <span>Level <span id="level">1</span></span>
        </div>
        
        <div class="instruments">
            <div class="instrument" onclick="playSound(1)">
                <div class="instrument-icon">🥁</div>
                <span>Drum</span>
            </div>
            <div class="instrument" onclick="playSound(2)">
                <div class="instrument-icon">🎹</div>
                <span>Piano</span>
            </div>
            <div class="instrument" onclick="playSound(3)">
                <div class="instrument-icon">🔔</div>
                <span>Bell</span>
            </div>
            <div class="instrument" onclick="playSound(4)">
                <div class="instrument-icon">🎸</div>
                <span>Guitar</span>
            </div>
        </div>
        
        <div class="pattern-area">
            <h3 style="text-align: center;">Follow the Pattern</h3>
            <div class="pattern-display" id="pattern"></div>
            <div style="text-align: center;">
                <button onclick="playPattern()">▶ Play Pattern</button>
                <button onclick="newPattern()">🔄 New Pattern</button>
            </div>
        </div>
    </div>
    
    <script>
        let level = 1;
        let currentPattern = [];
        let userPattern = [];
        let isPlaying = false;
        
        function playSound(instrument) {
            if (isPlaying) return;
            
            const icon = event.currentTarget.querySelector('.instrument-icon');
            icon.style.transform = 'scale(1.2)';
            icon.style.background = '#ffd700';
            
            setTimeout(() => {
                icon.style.transform = 'scale(1)';
                icon.style.background = 'linear-gradient(135deg, #1e3c72 0%, #2a5298 100%)';
            }, 200);
            
            userPattern.push(instrument);
            checkPattern();
        }
        
        function playPattern() {
            if (isPlaying) return;
            isPlaying = true;
            
            let i = 0;
            const interval = setInterval(() => {
                if (i < currentPattern.length) {
                    const instrument = currentPattern[i];
                    const icons = document.querySelectorAll('.instrument-icon');
                    icons[instrument-1].style.transform = 'scale(1.2)';
                    icons[instrument-1].style.background = '#ffd700';
                    
                    setTimeout(() => {
                        icons[instrument-1].style.transform = 'scale(1)';
                        icons[instrument-1].style.background = 'linear-gradient(135deg, #1e3c72 0%, #2a5298 100%)';
                    }, 300);
                    
                    i++;
                } else {
                    clearInterval(interval);
                    isPlaying = false;
                    userPattern = [];
                }
            }, 600);
        }
        
        function newPattern() {
            const length = 3 + level;
            currentPattern = [];
            for(let i = 0; i < length; i++) {
                currentPattern.push(Math.floor(Math.random() * 4) + 1);
            }
            
            const patternDiv = document.getElementById('pattern');
            patternDiv.innerHTML = '';
            currentPattern.forEach(p => {
                const box = document.createElement('div');
                box.className = 'pattern-box';
                patternDiv.appendChild(box);
            });
        }
        
        function checkPattern() {
            if (userPattern.length === currentPattern.length) {
                let correct = true;
                for(let i = 0; i < currentPattern.length; i++) {
                    if (userPattern[i] !== currentPattern[i]) {
                        correct = false;
                        break;
                    }
                }
                
                if (correct) {
                    level++;
                    document.getElementById('level').textContent = level;
                    setTimeout(() => {
                        alert('🎉 Great job! Level up!');
                        newPattern();
                    }, 500);
                } else {
                    alert('❌ Try again! Watch the pattern carefully.');
                }
                userPattern = [];
            }
        }
        
        newPattern();
    </script>
<script src="/static/js/game-tracker.js"></script>

    // تهيئة التتبع لهذه اللعبة

</script>
<script src="/static/js/auto-tracker.js"></script>
</body>
</html>
