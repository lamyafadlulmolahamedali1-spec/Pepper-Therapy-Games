<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Blast - Puzzle Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #3498db, #9b59b6); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .game-area { background: white; border-radius: 30px; padding: 30px; }
        .score-box { background: #4CAF50; color: white; padding: 10px 25px; border-radius: 30px; }
        .level-box { background: #FF9800; color: white; padding: 10px 25px; border-radius: 30px; }
        
        .game-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .grid-container {
            background: #2c3e50;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .game-grid {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            gap: 5px;
        }
        
        .grid-cell {
            width: 50px;
            height: 50px;
            background: #34495e;
            border-radius: 8px;
            transition: all 0.3s;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        
        .grid-cell.filled {
            background: #e74c3c;
            animation: popIn 0.3s;
        }
        
        .grid-cell.filled.blue { background: #3498db; }
        .grid-cell.filled.green { background: #2ecc71; }
        .grid-cell.filled.yellow { background: #f1c40f; }
        .grid-cell.filled.purple { background: #9b59b6; }
        .grid-cell.filled.orange { background: #e67e22; }
        
        @keyframes popIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .blocks-panel {
            width: 300px;
            background: #f5f5f5;
            border-radius: 20px;
            padding: 20px;
        }
        
        .next-blocks-title {
            font-size: 1.3em;
            margin-bottom: 20px;
            text-align: center;
            color: #333;
        }
        
        .block-piece {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .block-piece:hover {
            transform: scale(1.05);
            border-color: #3498db;
        }
        
        .block-piece.selected {
            border-color: #e74c3c;
            background: #fdf2f2;
        }
        
        .block-row {
            display: flex;
            gap: 5px;
            justify-content: center;
        }
        
        .block-cell {
            width: 35px;
            height: 35px;
            background: #3498db;
            border-radius: 6px;
        }
        
        .stats-panel {
            margin-top: 20px;
            text-align: center;
        }
        
        .score-big {
            font-size: 2em;
            font-weight: bold;
            color: #e74c3c;
            margin: 10px 0;
        }
        
        .new-game-btn {
            width: 100%;
            padding: 15px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .new-game-btn:hover {
            transform: scale(1.05);
            background: #27ae60;
        }
        
        .reward { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 4em; background: rgba(255,255,255,0.95); padding: 30px 50px; border-radius: 60px; animation: pop 0.8s; z-index: 1000; }
        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0); } 50% { transform: translate(-50%, -50%) scale(1.3); } 100% { transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="display: flex; gap: 15px;">
                <span class="level-box" id="levelDisplay">Level 1</span>
                <span class="score-box" id="scoreDisplay">🏆 0</span>
            </div>
            <h1>🧱 Block Blast</h1>
            <a href="/child/dashboard" style="background: #f44336; color: white; padding: 10px 25px; border-radius: 30px; text-decoration: none;">🔙 Back</a>
        </div>

        <div class="game-area">
            <div class="game-container">
                <div class="grid-container">
                    <div class="game-grid" id="gameGrid"></div>
                </div>
                
                <div class="blocks-panel">
                    <div class="next-blocks-title">🎮 Next Blocks</div>
                    <div id="blocksContainer"></div>
                    
                    <div class="stats-panel">
                        <div class="score-big" id="scoreDisplay2">0</div>
                        <div>Score</div>
                    </div>
                    
                    <button class="new-game-btn" onclick="resetGame()">
                        🎮 New Game
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GRID_SIZE = 8;
        let grid = [];
        let blocks = [];
        let selectedBlock = null;
        let score = 0;
        let level = 1;
        
        const BLOCK_SHAPES = [
            { shape: [[1]], color: 'red' },
            { shape: [[1,1]], color: 'blue' },
            { shape: [[1],[1]], color: 'green' },
            { shape: [[1,1],[1,1]], color: 'yellow' },
            { shape: [[1,1,1]], color: 'purple' },
            { shape: [[1],[1],[1]], color: 'orange' },
            { shape: [[1,1],[1,0]], color: 'red' },
            { shape: [[1,1],[0,1]], color: 'blue' },
            { shape: [[1,0],[1,1]], color: 'green' },
            { shape: [[0,1],[1,1]], color: 'purple' }
        ];

        function init() {
            createGrid();
            generateBlocks();
            loadProgress();
        }

        function createGrid() {
            grid = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                grid[i] = [];
                for (let j = 0; j < GRID_SIZE; j++) {
                    grid[i][j] = 0;
                }
            }
            renderGrid();
        }

        function renderGrid() {
            const gridElement = document.getElementById('gameGrid');
            gridElement.innerHTML = '';
            
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    if (grid[i][j] !== 0) {
                        cell.classList.add('filled');
                        const colors = ['red', 'blue', 'green', 'yellow', 'purple', 'orange'];
                        cell.classList.add(colors[grid[i][j] - 1]);
                    }
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    cell.onclick = () => placeBlock(i, j);
                    gridElement.appendChild(cell);
                }
            }
        }

        function generateBlocks() {
            blocks = [];
            for (let i = 0; i < 3; i++) {
                const randomShape = {...BLOCK_SHAPES[Math.floor(Math.random() * BLOCK_SHAPES.length)]};
                blocks.push(randomShape);
            }
            renderBlocks();
        }

        function renderBlocks() {
            const container = document.getElementById('blocksContainer');
            container.innerHTML = '';
            
            blocks.forEach((block, index) => {
                const blockDiv = document.createElement('div');
                blockDiv.className = `block-piece ${selectedBlock === index ? 'selected' : ''}`;
                blockDiv.onclick = (e) => {
                    e.stopPropagation();
                    selectBlock(index);
                };
                
                block.shape.forEach(row => {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'block-row';
                    row.forEach(cell => {
                        const cellDiv = document.createElement('div');
                        cellDiv.className = 'block-cell';
                        cellDiv.style.background = cell ? getColor(block.color) : 'transparent';
                        cellDiv.style.opacity = cell ? '1' : '0';
                        rowDiv.appendChild(cellDiv);
                    });
                    blockDiv.appendChild(rowDiv);
                });
                
                container.appendChild(blockDiv);
            });
        }

        function getColor(colorName) {
            const colors = {
                red: '#e74c3c',
                blue: '#3498db',
                green: '#2ecc71',
                yellow: '#f1c40f',
                purple: '#9b59b6',
                orange: '#e67e22'
            };
            return colors[colorName] || '#3498db';
        }

        function selectBlock(index) {
            if (selectedBlock === index) {
                selectedBlock = null;
            } else {
                selectedBlock = index;
            }
            renderBlocks();
        }

        function placeBlock(row, col) {
            if (selectedBlock === null) {
                alert('Select a block first!');
                return;
            }
            
            const block = blocks[selectedBlock];
            const shape = block.shape;
            
            // Check if block fits
            for (let i = 0; i < shape.length; i++) {
                for (let j = 0; j < shape[0].length; j++) {
                    if (shape[i][j]) {
                        const newRow = row + i;
                        const newCol = col + j;
                        if (newRow >= GRID_SIZE || newCol >= GRID_SIZE || grid[newRow][newCol] !== 0) {
                            alert("Can't place block there!");
                            return;
                        }
                    }
                }
            }
            
            // Place block
            for (let i = 0; i < shape.length; i++) {
                for (let j = 0; j < shape[0].length; j++) {
                    if (shape[i][j]) {
                        const newRow = row + i;
                        const newCol = col + j;
                        const colors = ['red', 'blue', 'green', 'yellow', 'purple', 'orange'];
                        grid[newRow][newCol] = colors.indexOf(block.color) + 1;
                    }
                }
            }
            
            // Remove placed block
            blocks.splice(selectedBlock, 1);
            selectedBlock = null;
            
            // Check for completed lines
            checkLines();
            
            // Add new block if needed
            if (blocks.length < 3) {
                const randomShape = {...BLOCK_SHAPES[Math.floor(Math.random() * BLOCK_SHAPES.length)]};
                blocks.push(randomShape);
            }
            
            renderGrid();
            renderBlocks();
            updateScore();
        }

        function checkLines() {
            let linesCleared = 0;
            
            // Check rows
            for (let i = 0; i < GRID_SIZE; i++) {
                if (grid[i].every(cell => cell !== 0)) {
                    for (let j = 0; j < GRID_SIZE; j++) {
                        grid[i][j] = 0;
                    }
                    linesCleared++;
                }
            }
            
            // Check columns
            for (let j = 0; j < GRID_SIZE; j++) {
                let columnFull = true;
                for (let i = 0; i < GRID_SIZE; i++) {
                    if (grid[i][j] === 0) {
                        columnFull = false;
                        break;
                    }
                }
                if (columnFull) {
                    for (let i = 0; i < GRID_SIZE; i++) {
                        grid[i][j] = 0;
                    }
                    linesCleared++;
                }
            }
            
            if (linesCleared > 0) {
                score += linesCleared * 100 * level;
                if (linesCleared >= 2) {
                    score += linesCleared * 50;
                }
                updateScore();
                
                if (Math.floor(score / 500) + 1 > level) {
                    level = Math.floor(score / 500) + 1;
                    document.getElementById('levelDisplay').textContent = `Level ${level}`;
                }
            }
        }

        function updateScore() {
            document.getElementById('scoreDisplay').textContent = `🏆 ${score}`;
            document.getElementById('scoreDisplay2').textContent = score;
        }

        function resetGame() {
            createGrid();
            generateBlocks();
            selectedBlock = null;
            score = 0;
            level = 1;
            updateScore();
            document.getElementById('levelDisplay').textContent = `Level 1`;
        }

        function loadProgress() {
            fetch('/child/game/block_blast/progress')
                .then(res => res.json())
                .then(data => {
                    if (data.score) score = data.score;
                    if (data.level) level = data.level;
                    updateScore();
                    document.getElementById('levelDisplay').textContent = `Level ${level}`;
                });
        }

        init();
    </script>
<script src="/static/js/game-tracker.js"></script>

<script src="/static/js/auto-tracker.js"></script>
</body>
</html>
