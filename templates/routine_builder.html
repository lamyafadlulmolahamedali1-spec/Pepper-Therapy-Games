<!DOCTYPE html>
<html>
<head>
    <title>Daily Routine Builder</title>
    <script src="/static/js/game-tracker.js"></script>
    <script src="/static/js/pepper-voice.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
        }
        h1 { text-align: center; color: #333; }
        .task {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .task.completed { background: #d4edda; text-decoration: line-through; }
        .progress-bar { width: 100%; height: 15px; background: #f0f0f0; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(135deg, #28a745, #20c997); transition: width 0.5s; }
        .back-btn { display: block; text-align: center; margin-top: 20px; color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Daily Routine Builder</h1>
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 0%"></div></div>
        <div id="tasks"></div>
        <a href="/" class="back-btn">← Back</a>
    </div>
    <script>
        const stats = new GameStats('routine_builder');
        let tasks = [
            '🌅 Wake up', '🪥 Brush teeth', '👕 Get dressed', '🥣 Eat breakfast', '📚 Learning time',
            '🏃 Play outside', '🍎 Lunch', '😴 Rest time', '📖 Read a book', '🎨 Creative play',
            '🍽️ Dinner', '🛁 Bath time', '📖 Bedtime story', '😴 Go to sleep'
        ].map((n, i) => ({ name: n, done: false }));
        
        function update() {
            const done = tasks.filter(t => t.done).length;
            document.getElementById('progress').style.width = (done / tasks.length * 100) + '%';
            if (done === tasks.length) {
                stats.addCorrect();
                stats.levelUp();
                PepperVoice.speak("Wonderful! You completed your daily routine!");
                setTimeout(() => tasks.forEach(t => t.done = false), 2000);
            }
        }
        
        function complete(i) {
            if (!tasks[i].done) {
                tasks[i].done = true;
                stats.addCorrect();
                PepperVoice.speak(`Great! ${tasks[i].name} completed!`);
                update();
                render();
            }
        }
        
        function render() {
            const container = document.getElementById('tasks');
            container.innerHTML = '';
            tasks.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = 'task' + (t.done ? ' completed' : '');
                div.innerHTML = `<span>${t.name}</span><span>${t.done ? '✅' : '⬜'}</span>`;
                div.onclick = () => complete(i);
                container.appendChild(div);
            });
        }
        PepperVoice.speak("Let's build your daily routine! Click on each task when you complete it.");
        render();
    </script>
</body>
</html>
