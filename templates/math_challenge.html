<!DOCTYPE html>
<html>
<head>
    <title>Math Challenge</title>
    <script src="/static/js/game-tracker.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
        }
        h1 { text-align: center; color: #333; }
        .question {
            text-align: center;
            font-size: 3em;
            margin: 40px 0;
            padding: 40px;
            background: #f0f0f0;
            border-radius: 20px;
        }
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        .option {
            padding: 20px;
            font-size: 1.8em;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            text-align: center;
        }
        .option:hover { background: #764ba2; }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 Math Challenge</h1>
        
        <div class="question" id="question">5 + 3 = ?</div>
        <div class="options" id="options"></div>
        
        <div style="text-align: center;">
            <a href="/" class="back-btn">← Back to Games</a>
        </div>
    </div>
    
    <script>
        // Initialize tracker for this game
        const stats = new GameStats('math_challenge');
        
        let currentAnswer = 0;
        let level = 1;
        
        function generateQuestion() {
            let num1 = Math.floor(Math.random() * (5 + level)) + 1;
            let num2 = Math.floor(Math.random() * (5 + level)) + 1;
            let operator = Math.random() > 0.5 ? '+' : '-';
            
            if (operator === '+') {
                currentAnswer = num1 + num2;
                document.getElementById('question').textContent = `${num1} + ${num2} = ?`;
            } else {
                if (num1 < num2) [num1, num2] = [num2, num1];
                currentAnswer = num1 - num2;
                document.getElementById('question').textContent = `${num1} - ${num2} = ?`;
            }
            return currentAnswer;
        }
        
        function displayQuestion() {
            generateQuestion();
            
            const options = [currentAnswer];
            while(options.length < 4) {
                let wrong = currentAnswer + Math.floor(Math.random() * 5) - 2;
                if (wrong > 0 && !options.includes(wrong)) options.push(wrong);
            }
            options.sort(() => Math.random() - 0.5);
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(opt);
                optionsDiv.appendChild(btn);
            });
        }
        
        function checkAnswer(selected) {
            if (selected == currentAnswer) {
                // CORRECT ANSWER
                stats.addCorrect();
                if (stats.correct % 3 === 0) {
                    level++;
                }
            } else {
                // WRONG ANSWER
                stats.addWrong();
            }
            setTimeout(displayQuestion, 1000);
        }
        
        displayQuestion();
    </script>
<script src="/static/js/auto-tracker.js"></script>
</body>
</html>
