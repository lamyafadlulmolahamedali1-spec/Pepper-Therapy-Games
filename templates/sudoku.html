<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku - Infinite Puzzles</title>
    <style>
        body { font-family: Arial; background: linear-gradient(135deg, #673AB7, #9C27B0); padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .game-area { background: white; border-radius: 30px; padding: 30px; text-align: center; }
        
        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            gap: 5px;
            justify-content: center;
            margin: 30px;
        }
        .cell {
            width: 80px;
            height: 80px;
            background: #f0f0f0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            font-weight: bold;
            border: 2px solid #ddd;
        }
        .cell input {
            width: 70px;
            height: 70px;
            text-align: center;
            font-size: 2em;
            border: none;
            background: transparent;
            border-radius: 8px;
        }
        .cell input:focus { outline: none; background: #e3f2fd; }
        .cell.given { background: #e8f5e8; color: #333; }
        
        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 30px;
        }
        .control-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s;
            background: #4CAF50;
            color: white;
        }
        .control-btn:hover { transform: scale(1.1); }
        .control-btn.new { background: #2196F3; }
        
        .score-board { background: #4CAF50; color: white; padding: 15px 30px; border-radius: 30px; }
        .level-badge { background: #FF9800; color: white; padding: 10px 25px; border-radius: 25px; margin-right: 15px; }
        .back-btn { background: #f44336; color: white; padding: 10px 25px; border-radius: 30px; text-decoration: none; }
        .reward { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 4em; background: white; padding: 30px; border-radius: 60px; animation: pop 0.5s; z-index: 1000; }
        @keyframes pop { 0%{transform:translate(-50%,-50%) scale(0)} 100%{transform:translate(-50%,-50%) scale(1)} }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <span class="level-badge" id="levelDisplay">Level 1</span>
                <span class="score-board" id="score">0</span>
            </div>
            <h1>🔢 Sudoku</h1>
            <a href="/child/dashboard" class="back-btn">🔙 Back</a>
        </div>
        <div class="game-area">
            <div class="sudoku-grid" id="sudokuGrid"></div>
            <div class="controls">
                <button class="control-btn" onclick="checkSolution()">✅ Check</button>
                <button class="control-btn new" onclick="newPuzzle()">🔄 New Puzzle</button>
            </div>
        </div>
    </div>
    <script>
        let level = 1;
        let score = 0;
        let puzzle = [];
        let solution = [];
        let cells = [];

        function playSound(text) {
            try {
                let utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            } catch(e) {}
        }

        function showConfetti() {
            for(let i=0; i<20; i++) {
                let confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.left = Math.random()*100 + '%';
                confetti.style.top = '-10px';
                confetti.style.color = ['#4CAF50','#2196F3','#FF9800','#f44336'][Math.floor(Math.random()*4)];
                confetti.style.fontSize = '20px';
                confetti.style.animation = `fall ${Math.random()*2+1}s linear`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function generatePuzzle() {
            // Simple 4x4 Sudoku generator
            let base = [
                [1,2,3,4],
                [3,4,1,2],
                [2,1,4,3],
                [4,3,2,1]
            ];
            
            // Make a copy and remove some numbers based on level
            puzzle = JSON.parse(JSON.stringify(base));
            let removeCount = 4 + level;
            
            for(let i=0; i<removeCount; i++) {
                let r = Math.floor(Math.random() * 4);
                let c = Math.floor(Math.random() * 4);
                puzzle[r][c] = 0;
            }
            
            solution = base;
            renderGrid();
        }

        function renderGrid() {
            let grid = document.getElementById('sudokuGrid');
            grid.innerHTML = '';
            for(let i=0; i<4; i++) {
                for(let j=0; j<4; j++) {
                    let cell = document.createElement('div');
                    cell.className = 'cell' + (puzzle[i][j] !== 0 ? ' given' : '');
                    if(puzzle[i][j] !== 0) {
                        cell.innerHTML = puzzle[i][j];
                    } else {
                        let input = document.createElement('input');
                        input.type = 'text';
                        input.maxLength = 1;
                        input.oninput = () => checkCell(i, j, input);
                        cell.appendChild(input);
                    }
                    grid.appendChild(cell);
                }
            }
        }

        function checkCell(row, col, input) {
            let val = parseInt(input.value);
            if(val === solution[row][col]) {
                input.style.background = '#c8e6c9';
                score += 10 * level;
                document.getElementById('score').textContent = score;
                playSound('Good!');
            } else if(val) {
                input.style.background = '#ffcdd2';
            } else {
                input.style.background = '';
            }
        }

        function checkSolution() {
            let correct = 0;
            let inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                let val = parseInt(input.value);
                if(val) correct++;
            });
            
            if(correct === 4 + level) {
                level++;
                document.getElementById('levelDisplay').textContent = 'Level ' + level;
                showReward('🌟 Level Up!');
                playSound('Level Up!');
                showConfetti();
                score += 100;
                document.getElementById('score').textContent = score;
                saveProgress();
                setTimeout(newPuzzle, 2000);
            }
        }

        function newPuzzle() {
            generatePuzzle();
        }

        function saveProgress() {
            fetch('/api/progress/sudoku', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ level: level, score: score, correct: true })
            });
        }

        function loadProgress() {
            fetch('/api/progress/sudoku')
                .then(res => res.json())
                .then(data => {
                    level = data.level || 1;
                    score = data.score || 0;
                    document.getElementById('levelDisplay').textContent = 'Level ' + level;
                    document.getElementById('score').textContent = score;
                    generatePuzzle();
                });
        }

        function showReward(msg) {
            let r = document.createElement('div');
            r.className = 'reward';
            r.textContent = msg;
            document.body.appendChild(r);
            setTimeout(() => r.remove(), 1500);
        }

        loadProgress();
    </script>
    <style>
        @keyframes fall {
            to { transform: translateY(100vh); }
        }
    </style>
<script src="/static/js/game-tracker.js"></script>

    // تهيئة التتبع لهذه اللعبة

</script>
<script src="/static/js/auto-tracker.js"></script>
</body>
</html>
