<!DOCTYPE html>
<html>
<head>
    <title>SpectrumCare - Pattern Game</title>
    <script src="/static/js/game-tracker.js"></script>
    <script src="/static/js/pepper-voice.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }
        h1 { color: #333; }
        .pattern { display: flex; justify-content: center; gap: 20px; margin: 40px 0; }
        .pattern-box { width: 80px; height: 80px; background: #f0f0f0; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2em; }
        .options { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
        .option { padding: 15px 30px; background: #667eea; color: white; border-radius: 20px; cursor: pointer; }
        .back-btn { display: inline-block; margin-top: 20px; color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 SpectrumCare - Pattern Game</h1>
        <div class="pattern" id="pattern"></div>
        <div class="options" id="options"></div>
        <a href="/" class="back-btn">← Back</a>
    </div>
    <script>
        const stats = new GameStats('spectrumcare');
        const shapes = ['🔴', '🔵', '🟢', '🟡'];
        let answer = '';
        
        PepperVoice.speak("Complete the pattern! What comes next?");
        
        function next() {
            answer = shapes[Math.floor(Math.random() * shapes.length)];
            const patternDiv = document.getElementById('pattern');
            patternDiv.innerHTML = '';
            for(let i=0;i<3;i++) patternDiv.innerHTML += `<div class="pattern-box">${answer}</div>`;
            patternDiv.innerHTML += `<div class="pattern-box">?</div>`;
            const options = [answer];
            while(options.length<3) {
                const r = shapes[Math.floor(Math.random() * shapes.length)];
                if(!options.includes(r)) options.push(r);
            }
            options.sort(() => Math.random() - 0.5);
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            options.forEach(o => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = o;
                btn.onclick = () => check(o);
                optDiv.appendChild(btn);
            });
        }
        
        function check(selected) {
            if(selected === answer) {
                stats.addCorrect();
                PepperVoice.speak("Perfect! You got it!");
                setTimeout(next, 1500);
            } else {
                stats.addWrong();
                PepperVoice.speak("Try again! Look at the pattern.");
            }
        }
        next();
    </script>
</body>
</html>
