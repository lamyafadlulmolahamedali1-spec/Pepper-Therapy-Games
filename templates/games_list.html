<!DOCTYPE html>
<html>
<head>
    <title>Games - Pepper Therapy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }
        .game-card {
            background: #f8f9fa;
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
            text-decoration: none;
            display: block;
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: #667eea;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .game-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .game-name {
            font-weight: bold;
            font-size: 0.9em;
            color: #333;
        }
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #667eea;
            text-decoration: none;
        }
        .progress-link {
            text-align: center;
            margin-bottom: 20px;
        }
        .progress-link a {
            display: inline-block;
            padding: 10px 20px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress-link">
            <a href="/progress">📊 View Progress Dashboard</a>
            <a href="https://gemini.google.com" target="_blank">✨ Google Gemini AI</a>
        </div>
        <h1>🎮 All Games</h1>
        <div class="subtitle">{{ games|length }} games available</div>
        <div class="games-grid">
            {% for game in games %}
            <a href="/game/{{ game }}" class="game-card">
                <div class="game-icon">{{ icons[game] }}</div>
                <div class="game-name">{{ game.replace('_', ' ').title() }}</div>
            </a>
            {% endfor %}
        </div>
        <a href="/" class="back-btn">← Back to Home</a>
    </div>
</body>
</html>
