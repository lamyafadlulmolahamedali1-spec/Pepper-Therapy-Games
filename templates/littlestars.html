<!DOCTYPE html>
<html>
<head>
    <title>LittleStars - Counting Game</title>
    <script src="/static/js/game-tracker.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }
        h1 { color: #333; }
        .stars { font-size: 4em; margin: 30px 0; }
        .options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .option {
            padding: 20px;
            background: #f0f0f0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.5em;
        }
        .back-btn { display: block; margin-top: 20px; color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⭐ LittleStars - Counting</h1>
        <div class="stars" id="stars"></div>
        <div class="options" id="options"></div>
        <a href="/" class="back-btn">← Back</a>
    </div>
    
    <script>
        const stats = new GameStats('littlestars');
        let currentCount = 0;
        
        function nextRound() {
            currentCount = Math.floor(Math.random() * 5) + 1;
            document.getElementById('stars').textContent = '⭐'.repeat(currentCount);
            
            const options = [currentCount];
            while(options.length < 3) {
                const random = Math.floor(Math.random() * 5) + 1;
                if (!options.includes(random)) options.push(random);
            }
            options.sort(() => Math.random() - 0.5);
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(opt);
                optionsDiv.appendChild(btn);
            });
        }
        
        function checkAnswer(selected) {
            if (selected == currentCount) {
                stats.addCorrect();
                setTimeout(nextRound, 1000);
            } else {
                stats.addWrong();
            }
        }
        
        nextRound();
    </script>
</body>
</html>
