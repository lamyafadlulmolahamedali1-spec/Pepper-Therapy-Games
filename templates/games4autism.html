<!DOCTYPE html>
<html>
<head>
    <title>Games4Autism - Color Match</title>
    <script src="/static/js/game-tracker.js"></script>
    <script src="/static/js/pepper-voice.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }
        h1 { color: #333; }
        .color-box {
            width: 200px;
            height: 200px;
            margin: 30px auto;
            border-radius: 20px;
            border: 4px solid #333;
        }
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .option {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.2em;
        }
        .back-btn { display: inline-block; margin-top: 20px; color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Games4Autism - Color Match</h1>
        <div class="color-box" id="colorBox"></div>
        <div class="options" id="options"></div>
        <a href="/" class="back-btn">← Back</a>
    </div>
    
    <script>
        const stats = new GameStats('games4autism');
        const colors = [
            { name: 'Red', code: '#ff4757' },
            { name: 'Blue', code: '#1e90ff' },
            { name: 'Green', code: '#2ed573' },
            { name: 'Yellow', code: '#ffa502' }
        ];
        let currentColor = null;
        
        PepperVoice.speak("Match the colors! What color do you see?");
        
        function nextRound() {
            currentColor = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('colorBox').style.backgroundColor = currentColor.code;
            
            const options = [currentColor];
            while(options.length < 4) {
                const random = colors[Math.floor(Math.random() * colors.length)];
                if (!options.includes(random)) options.push(random);
            }
            options.sort(() => Math.random() - 0.5);
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = opt.name;
                btn.onclick = () => checkAnswer(opt);
                optionsDiv.appendChild(btn);
            });
        }
        
        function checkAnswer(selected) {
            if (selected.name === currentColor.name) {
                stats.addCorrect();
                PepperVoice.speak(`Yes! ${currentColor.name} is correct!`);
                setTimeout(nextRound, 1500);
            } else {
                stats.addWrong();
                PepperVoice.speak(`That's ${selected.name}. Try again!`);
            }
        }
        
        nextRound();
    </script>
</body>
</html>
