<!DOCTYPE html>
<html>
<head>
    <title>Emotion Recognition Game</title>
    <script src="/static/js/game-tracker.js"></script>
    <script src="/static/js/pepper-voice.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }
        h1 { color: #333; }
        .emotion { font-size: 8em; margin: 30px 0; padding: 30px; background: #f8f9fa; border-radius: 30px; }
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .option {
            padding: 20px;
            background: #f0f0f0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.2em;
        }
        .back-btn { display: inline-block; margin-top: 20px; color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>😊 Emotion Recognition</h1>
        <div class="emotion" id="emotion">😊</div>
        <div class="options" id="options"></div>
        <a href="/" class="back-btn">← Back</a>
    </div>
    <script>
        const stats = new GameStats('emotion_game');
        const emotions = [
            { icon: '😊', name: 'Happy' }, { icon: '😢', name: 'Sad' },
            { icon: '😡', name: 'Angry' }, { icon: '😴', name: 'Tired' },
            { icon: '🥳', name: 'Excited' }, { icon: '😱', name: 'Scared' }
        ];
        let current = null;
        
        PepperVoice.speak("Let's learn about emotions! How are they feeling?");
        
        function nextRound() {
            current = emotions[Math.floor(Math.random() * emotions.length)];
            document.getElementById('emotion').textContent = current.icon;
            const options = [current];
            while(options.length < 4) {
                const r = emotions[Math.floor(Math.random() * emotions.length)];
                if (!options.includes(r)) options.push(r);
            }
            options.sort(() => Math.random() - 0.5);
            const div = document.getElementById('options');
            div.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = opt.name;
                btn.onclick = () => check(opt);
                div.appendChild(btn);
            });
        }
        
        function check(selected) {
            if (selected.name === current.name) {
                stats.addCorrect();
                PepperVoice.speak(`Yes! They are ${current.name}! Good job!`);
                setTimeout(nextRound, 1500);
            } else {
                stats.addWrong();
                PepperVoice.speak(`That's ${selected.name}. They are ${current.name}. Try again!`);
            }
        }
        nextRound();
    </script>
</body>
</html>
