<!DOCTYPE html>
<html>
<head>
    <title>CogniBuddy - Pattern Match</title>
    <script src="/static/js/game-tracker.js"></script>
    <script src="/static/js/pepper-voice.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }
        h1 { color: #333; }
        .pattern {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
        }
        .pattern-item {
            width: 80px;
            height: 80px;
            background: #667eea;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
        }
        .options {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        .option {
            width: 80px;
            height: 80px;
            background: #f0f0f0;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            cursor: pointer;
        }
        .back-btn { display: block; margin-top: 20px; color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧩 CogniBuddy - Pattern Match</h1>
        <div class="pattern" id="pattern"></div>
        <div class="options" id="options"></div>
        <a href="/" class="back-btn">← Back</a>
    </div>
    
    <script>
        const stats = new GameStats('cognibuddy');
        const shapes = ['🔴', '🔵', '🟢', '🟡'];
        let currentPattern = [];
        let correctAnswer = '';
        
        PepperVoice.speak("Complete the pattern! What comes next?");
        
        function nextRound() {
            currentPattern = [shapes[Math.floor(Math.random() * shapes.length)], shapes[Math.floor(Math.random() * shapes.length)]];
            correctAnswer = shapes[Math.floor(Math.random() * shapes.length)];
            
            const patternDiv = document.getElementById('pattern');
            patternDiv.innerHTML = '';
            currentPattern.forEach(shape => {
                const div = document.createElement('div');
                div.className = 'pattern-item';
                div.textContent = shape;
                patternDiv.appendChild(div);
            });
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'pattern-item';
            emptyDiv.textContent = '?';
            patternDiv.appendChild(emptyDiv);
            
            const options = [correctAnswer];
            while(options.length < 3) {
                const random = shapes[Math.floor(Math.random() * shapes.length)];
                if (!options.includes(random)) options.push(random);
            }
            options.sort(() => Math.random() - 0.5);
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt;
                div.onclick = () => checkAnswer(opt);
                optionsDiv.appendChild(div);
            });
        }
        
        function checkAnswer(selected) {
            if (selected === correctAnswer) {
                stats.addCorrect();
                PepperVoice.speak("Perfect! You found the pattern!");
                setTimeout(nextRound, 1500);
            } else {
                stats.addWrong();
                PepperVoice.speak("Not quite. Look at the pattern again!");
            }
        }
        
        nextRound();
    </script>
</body>
</html>
