<!DOCTYPE html>
<html>
<head>
    <title>DoodleBop - Drawing Fun</title>
    <script src="/static/js/game-tracker.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }
        h1 { color: #333; }
        canvas {
            border: 4px solid #667eea;
            border-radius: 20px;
            margin: 20px 0;
            cursor: crosshair;
        }
        .colors {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .color {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #333;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            margin: 5px;
        }
        .back-btn { display: block; margin-top: 20px; color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 DoodleBop - Free Drawing</h1>
        <canvas id="canvas" width="500" height="400"></canvas>
        <div class="colors">
            <div class="color" style="background: #ff4757;" onclick="setColor('#ff4757')"></div>
            <div class="color" style="background: #1e90ff;" onclick="setColor('#1e90ff')"></div>
            <div class="color" style="background: #2ed573;" onclick="setColor('#2ed573')"></div>
            <div class="color" style="background: #ffa502;" onclick="setColor('#ffa502')"></div>
            <div class="color" style="background: #000000;" onclick="setColor('#000000')"></div>
        </div>
        <div>
            <button onclick="clearCanvas()">Clear</button>
            <button onclick="saveDrawing()">Save Drawing</button>
        </div>
        <a href="/" class="back-btn">← Back to Games</a>
    </div>
    
    <script>
        const stats = new GameStats('doodlebop');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let currentColor = '#ff4757';
        
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        function setColor(color) { currentColor = color; }
        
        function startDrawing(e) { drawing = true; draw(e); }
        
        function draw(e) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ctx.fillStyle = currentColor;
            ctx.fillRect(x - 5, y - 5, 10, 10);
        }
        
        function stopDrawing() { drawing = false; }
        function clearCanvas() { ctx.fillStyle = 'white'; ctx.fillRect(0, 0, canvas.width, canvas.height); }
        function saveDrawing() { stats.addCorrect(); alert('🎨 Drawing saved! Great job!'); }
        
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
    </script>
</body>
</html>
