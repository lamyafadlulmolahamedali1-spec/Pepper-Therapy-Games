<!DOCTYPE html>
<html>
<head>
    <title>Counting Fun</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px
        }
        .container{
            max-width:600px;
            background:white;
            border-radius:30px;
            padding:30px;
            text-align:center;
            box-shadow:0 20px 40px rgba(0,0,0,0.2)
        }
        h1{
            color:#764ba2;
            margin-bottom:20px;
            font-size:28px
        }
        .score-board{
            background:#f8f9fa;
            padding:20px;
            border-radius:20px;
            margin:20px 0;
            display:flex;
            justify-content:space-around;
            flex-wrap:wrap;
            gap:15px
        }
        .score-item{
            text-align:center;
            padding:10px 20px;
            background:#e9ecef;
            border-radius:15px;
            min-width:100px
        }
        .score-value{
            font-size:32px;
            font-weight:bold;
            color:#764ba2
        }
        .objects{
            font-size:70px;
            margin:20px;
            padding:30px;
            background:#f0f0f0;
            border-radius:20px;
            line-height:1.5
        }
        .options{
            display:flex;
            justify-content:center;
            gap:20px;
            margin:20px 0;
            flex-wrap:wrap
        }
        .option{
            background:#667eea;
            color:white;
            padding:15px 25px;
            border-radius:20px;
            cursor:pointer;
            font-size:28px;
            font-weight:bold;
            transition:0.3s;
            min-width:80px
        }
        .option:hover{
            background:#764ba2;
            transform:scale(1.05)
        }
        button{
            background:#4caf50;
            color:white;
            border:none;
            padding:12px 30px;
            border-radius:30px;
            font-size:16px;
            cursor:pointer;
            margin-top:20px;
            transition:0.3s
        }
        button:hover{
            background:#45a049;
            transform:scale(1.02)
        }
        .feedback{
            margin:15px 0;
            padding:12px;
            border-radius:10px;
            font-size:16px
        }
        .correct-feedback{background:#d4edda;color:#155724}
        .wrong-feedback{background:#f8d7da;color:#721c24}
    </style>
</head>
<body>
<div class="container">
    <h1>🔢 Counting Fun</h1>
    <p>Count the objects and choose the correct number!</p>
    
    <div class="score-board">
        <div class="score-item">
            <div>✅ CORRECT</div>
            <div class="score-value" id="correctCount">0</div>
        </div>
        <div class="score-item">
            <div>❌ WRONG</div>
            <div class="score-value" id="wrongCount">0</div>
        </div>
        <div class="score-item">
            <div>💰 SCORE</div>
            <div class="score-value" id="scoreCount">0</div>
        </div>
    </div>
    
    <div class="objects" id="objects">🐶 🐶 🐶</div>
    
    <div class="options" id="options"></div>
    
    <button onclick="nextQuestion()">Next Question →</button>
    <div id="feedback" class="feedback"></div>
</div>

<script>
let currentNumber = 0;
let correct = 0;
let wrong = 0;
let score = 0;
let childName = "{{ child_name }}";
let gameId = "{{ game.id }}";

// Update display
function updateDisplay() {
    document.getElementById('correctCount').innerText = correct;
    document.getElementById('wrongCount').innerText = wrong;
    document.getElementById('scoreCount').innerText = score;
}

// Save score to server
async function saveScore() {
    try {
        let response = await fetch('/api/submit-score', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                child_name: childName,
                game_id: gameId,
                correct: correct,
                wrong: wrong,
                score: score
            })
        });
        let result = await response.json();
        console.log('Score saved:', result);
    } catch(e) {
        console.error('Error saving score:', e);
    }
}

// Show feedback message
function showFeedback(message, isCorrect) {
    let fb = document.getElementById('feedback');
    fb.className = 'feedback ' + (isCorrect ? 'correct-feedback' : 'wrong-feedback');
    fb.innerHTML = message;
    setTimeout(() => {
        fb.innerHTML = '';
        fb.className = 'feedback';
    }, 1500);
}

// Load new question
function loadQuestion() {
    // Random number between 1 and 7
    currentNumber = Math.floor(Math.random() * 7) + 1;
    
    // Random emojis
    let emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐸', '🐒', '🐔', '🐧', '🐦', '🐴', '🐝', '🐞', '🐟', '🐠', '🐡'];
    let str = '';
    for(let i = 0; i < currentNumber; i++) {
        str += emojis[Math.floor(Math.random() * emojis.length)] + ' ';
    }
    document.getElementById('objects').innerHTML = str;
    
    // Create options
    let opts = [currentNumber, currentNumber + 1, currentNumber - 1, currentNumber + 2];
    opts = opts.filter(n => n >= 1 && n <= 9);
    opts = [...new Set(opts)]; // remove duplicates
    if (opts.length < 3) {
        opts = [currentNumber, currentNumber + 1, currentNumber - 1];
    }
    opts.sort(() => Math.random() - 0.5);
    
    let html = '';
    opts.forEach(n => {
        html += `<div class="option" onclick="checkAnswer(${n})">${n}</div>`;
    });
    document.getElementById('options').innerHTML = html;
}

// Check answer
async function checkAnswer(answer) {
    if (answer === currentNumber) {
        correct++;
        score += 10;
        updateDisplay();
        await saveScore();
        showFeedback('✅ Correct! Great job! +10 points', true);
    } else {
        wrong++;
        updateDisplay();
        await saveScore();
        showFeedback(`❌ Oops! The correct answer was ${currentNumber}. Try again!`, false);
    }
    setTimeout(() => loadQuestion(), 1000);
}

// Next question
function nextQuestion() {
    loadQuestion();
}

// Initialize
loadQuestion();
updateDisplay();

// Auto-save every 5 seconds
setInterval(saveScore, 5000);
window.addEventListener('beforeunload', () => saveScore());
</script>
</body></html>
