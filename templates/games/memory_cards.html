<!DOCTYPE html>
<html>
<head>
    <title>Memory Cards</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
        }
        h1 { text-align: center; color: #333; }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        .card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            cursor: pointer;
            transition: 0.3s;
        }
        .card.flipped {
            background: white;
            border: 3px solid #667eea;
        }
        .card.matched {
            background: #d4edda;
            cursor: default;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Memory Cards</h1>
        <div class="stats">
            <div>Level: <span id="level">1</span></div>
            <div>Moves: <span id="moves">0</span></div>
            <div>Pairs: <span id="pairs">0/6</span></div>
        </div>
        <div class="grid" id="grid"></div>
        <div style="text-align: center;"><button onclick="newGame()">New Game</button></div>
    </div>
    
    <script>
        let level = 1;
        let moves = 0;
        let pairs = 0;
        let cards = [];
        let flipped = [];
        let canFlip = true;
        
        const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
        
        const childUsername = '{{ child_username }}';
        const gameId = 'memory_cards';
        
        function saveProgress() {
            fetch('/api/progress/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    child_username: childUsername,
                    game_id: gameId,
                    level: level,
                    score: moves * 10,
                    correct: pairs,
                    wrong: moves - pairs
                })
            }).catch(e => console.log('Error:', e));
        }
        
        function initGame() {
            const numPairs = 6 + Math.floor(level / 2);
            const selected = emojis.slice(0, numPairs);
            cards = [...selected, ...selected];
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            moves = 0;
            pairs = 0;
            flipped = [];
            render();
            updateStats();
        }
        
        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            cards.forEach((card, i) => {
                const div = document.createElement('div');
                div.className = 'card';
                if (flipped.includes(i)) div.classList.add('flipped');
                if (card === 'matched') div.classList.add('matched');
                div.textContent = flipped.includes(i) ? card : '?';
                div.onclick = () => flipCard(i);
                grid.appendChild(div);
            });
        }
        
        function flipCard(i) {
            if (!canFlip) return;
            if (flipped.includes(i)) return;
            if (cards[i] === 'matched') return;
            if (flipped.length >= 2) return;
            
            flipped.push(i);
            moves++;
            updateStats();
            
            if (flipped.length === 2) {
                canFlip = false;
                setTimeout(() => checkMatch(), 500);
            }
            render();
        }
        
        function checkMatch() {
            const [i, j] = flipped;
            if (cards[i] === cards[j]) {
                cards[i] = 'matched';
                cards[j] = 'matched';
                pairs++;
                if (pairs === 6 + Math.floor(level / 2)) {
                    level++;
                    setTimeout(() => initGame(), 1000);
                }
            }
            flipped = [];
            canFlip = true;
            updateStats();
            saveProgress();
            render();
        }
        
        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('moves').textContent = moves;
            document.getElementById('pairs').textContent = `${pairs}/${6 + Math.floor(level / 2)}`;
        }
        
        function newGame() {
            level = 1;
            initGame();
        }
        
        initGame();
    </script>
</body>
</html>
