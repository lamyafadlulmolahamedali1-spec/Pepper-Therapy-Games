<!DOCTYPE html>
<html>
<head>
    <title>Progress Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
        }
        h1 { color: #333; text-align: center; }
        .game-card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
            border-left: 5px solid #667eea;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 15px 0;
        }
        .stat {
            background: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }
        .correct { color: #28a745; }
        .wrong { color: #dc3545; }
        .score { color: #ffc107; }
        .level { color: #17a2b8; }
        .back-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Progress Dashboard</h1>
        <div id="progressData"></div>
        <a href="/" class="back-btn">← Back to Games</a>
        <button onclick="clearAllData()" style="margin-left: 10px; padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 20px; cursor: pointer;">Clear All Data</button>
    </div>
    <script>
        function loadProgress() {
            const games = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('game_')) games.push(key);
            }
            const container = document.getElementById('progressData');
            if (games.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#999;">No game data yet. Play some games!</p>';
                return;
            }
            let html = '';
            for (const key of games.sort()) {
                const gameId = key.replace('game_', '');
                const data = JSON.parse(localStorage.getItem(key));
                const total = data.correct + data.wrong;
                const accuracy = total > 0 ? Math.round((data.correct / total) * 100) : 0;
                html += `
                    <div class="game-card">
                        <h3>🎮 ${gameId.replace(/_/g, ' ').toUpperCase()}</h3>
                        <div class="stats">
                            <div class="stat"><div class="correct">${data.correct}</div>✅ Correct</div>
                            <div class="stat"><div class="wrong">${data.wrong}</div>❌ Wrong</div>
                            <div class="stat"><div class="score">${data.score}</div>⭐ Score</div>
                            <div class="stat"><div class="level">${data.level}</div>📈 Level</div>
                        </div>
                        <div>📊 Accuracy: ${accuracy}%</div>
                        <div>🕐 Last played: ${new Date(data.lastPlayed).toLocaleDateString()}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        function clearAllData() {
            if (confirm('Clear ALL game progress?')) {
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith('game_')) localStorage.removeItem(key);
                }
                loadProgress();
            }
        }
        loadProgress();
    </script>
</body>
</html>
