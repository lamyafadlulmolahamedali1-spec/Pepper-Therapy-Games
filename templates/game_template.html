<!DOCTYPE html>
<html>
<head>
    <title>{{ game.name }}</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI';background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:center}
        .container{max-width:600px;margin:0 auto;background:white;border-radius:30px;padding:30px;text-align:center}
        h1{color:#764ba2}
        .game-icon{font-size:60px;margin:10px 0}
        .score-board{background:#f8f9fa;padding:20px;border-radius:20px;margin:20px 0;display:flex;justify-content:space-around}
        .score-item{text-align:center;padding:10px;background:#e9ecef;border-radius:15px;min-width:80px}
        .score-value{font-size:28px;font-weight:bold;color:#764ba2}
        .game-area{margin:30px 0}
        button{padding:15px 30px;border-radius:30px;font-size:16px;cursor:pointer;margin:10px;border:none}
        .correct-btn{background:#4caf50;color:white}
        .wrong-btn{background:#f44336;color:white}
        .feedback{padding:10px;border-radius:10px;margin:20px 0}
    </style>
</head>
<body>
<div class="container">
    <div class="game-icon">{{ game.icon }}</div>
    <h1>{{ game.name }}</h1>
    <div class="score-board">
        <div class="score-item"><div>✅ CORRECT</div><div class="score-value" id="correctCount">0</div></div>
        <div class="score-item"><div>❌ WRONG</div><div class="score-value" id="wrongCount">0</div></div>
        <div class="score-item"><div>💰 SCORE</div><div class="score-value" id="scoreCount">0</div></div>
    </div>
    <div class="game-area">
        <button class="correct-btn" onclick="addCorrect()">✓ Correct Answer (+10)</button>
        <button class="wrong-btn" onclick="addWrong()">✗ Wrong Answer</button>
    </div>
    <div id="feedback" class="feedback"></div>
</div>
<script>
let correct=0, wrong=0, score=0;
let childName = "{{ child_name }}";
let gameId = "{{ game.id }}";
function updateDisplay(){
    document.getElementById('correctCount').innerText=correct;
    document.getElementById('wrongCount').innerText=wrong;
    document.getElementById('scoreCount').innerText=score;
}
async function saveScore(){
    try{
        await fetch('/api/submit-score',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({child_name:childName,game_id:gameId,correct:correct,wrong:wrong,score:score})
        });
    }catch(e){console.error(e);}
}
function showFeedback(msg,isSuccess){
    let fb=document.getElementById('feedback');
    fb.style.backgroundColor=isSuccess?'#d4edda':'#f8d7da';
    fb.style.color=isSuccess?'#155724':'#721c24';
    fb.innerHTML=msg;
    setTimeout(()=>fb.innerHTML='',1500);
}
function addCorrect(){correct++;score+=10;updateDisplay();saveScore();showFeedback('✅ Correct! +10 points',true);}
function addWrong(){wrong++;updateDisplay();saveScore();showFeedback('❌ Keep trying!',false);}
updateDisplay();
setInterval(saveScore,5000);
window.addEventListener('beforeunload',()=>saveScore());
</script>
<script src="/static/js/game-tracker.js"></script>
<script>
    // تهيئة التتبع لهذه اللعبة
    const stats = new GameStats("game_template.html.replace(.html,)");
    // ربط الوظائف: قومي باستدعاء stats.addCorrect() عند الإجابة الصحيحة، و stats.addWrong() عند الإجابة الخاطئة
</script>
<script src="/static/js/auto-tracker.js"></script>
</body>
</html>
