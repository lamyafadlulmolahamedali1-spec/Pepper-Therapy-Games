<!DOCTYPE html>
<html>
<head>
    <title>ABA Matching</title>
    <script src="/static/js/game-tracker.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .game-area {
            text-align: center;
        }
        .target-card {
            background: #f8f9fa;
            border-radius: 30px;
            padding: 40px;
            margin: 30px auto;
            width: 200px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 4px solid #667eea;
        }
        .target-icon {
            font-size: 8em;
        }
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 40px 0;
        }
        .option-card {
            background: #f8f9fa;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 4px solid transparent;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .option-card:hover {
            transform: scale(1.05);
            border-color: #ffd700;
        }
        .option-icon {
            font-size: 5em;
        }
        .message {
            text-align: center;
            padding: 15px;
            border-radius: 20px;
            font-size: 1.2em;
            margin: 20px 0;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 ABA Matching</h1>
        
        <div class="game-area">
            <div class="target-card">
                <div class="target-icon" id="targetIcon">🍎</div>
            </div>
            <div class="options" id="options"></div>
            <div class="message" id="message"></div>
            <a href="/" class="back-btn">← Back to Games</a>
        </div>
    </div>
    
    <script>
        // Initialize tracker
        const stats = new GameStats('aba_matching');
        
        let level = 1;
        let currentTarget = null;
        let currentOptions = [];
        let correctIndex = -1;
        let canClick = true;
        
        // Data sets: each level has a category with items
        const categories = [
            { name: 'Fruits', items: ['🍎', '🍌', '🍊', '🍇', '🍒', '🥝'] },
            { name: 'Animals', items: ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊'] },
            { name: 'Vehicles', items: ['🚗', '🚲', '✈️', '🚂', '🚁', '⛵'] },
            { name: 'Food', items: ['🍕', '🍔', '🌮', '🥗', '🍦', '🍩'] },
            { name: 'Emojis', items: ['😊', '😢', '😡', '😴', '🥳', '😱'] }
        ];
        
        function getLevelCategory() {
            // Cycle through categories based on level
            const idx = (level - 1) % categories.length;
            return categories[idx];
        }
        
        function generateQuestion() {
            const category = getLevelCategory();
            const items = [...category.items];
            // Randomly select target
            const targetIndex = Math.floor(Math.random() * items.length);
            currentTarget = items[targetIndex];
            
            // Create options: include correct and 3 random others
            const optionsSet = new Set();
            optionsSet.add(currentTarget);
            while (optionsSet.size < 4) {
                const randomItem = items[Math.floor(Math.random() * items.length)];
                optionsSet.add(randomItem);
            }
            currentOptions = Array.from(optionsSet);
            // Shuffle options
            for (let i = currentOptions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentOptions[i], currentOptions[j]] = [currentOptions[j], currentOptions[i]];
            }
            // Find index of correct option
            correctIndex = currentOptions.indexOf(currentTarget);
            
            // Update display
            document.getElementById('targetIcon').textContent = currentTarget;
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            currentOptions.forEach((opt, idx) => {
                const card = document.createElement('div');
                card.className = 'option-card';
                card.innerHTML = `<div class="option-icon">${opt}</div>`;
                card.onclick = () => checkAnswer(idx);
                optionsDiv.appendChild(card);
            });
        }
        
        function checkAnswer(selectedIdx) {
            if (!canClick) return;
            canClick = false;
            
            const messageDiv = document.getElementById('message');
            if (selectedIdx === correctIndex) {
                // Correct match
                stats.addCorrect();
                messageDiv.innerHTML = '✅ Correct! +10 points';
                messageDiv.className = 'message success';
                // Level up every 3 correct answers
                if (stats.correct % 3 === 0) {
                    level++;
                    stats.levelUp();
                    messageDiv.innerHTML += ' 🎉 Level Up!';
                }
                setTimeout(() => {
                    generateQuestion();
                    messageDiv.innerHTML = '';
                    canClick = true;
                }, 1500);
            } else {
                // Wrong match
                stats.addWrong();
                messageDiv.innerHTML = '❌ Wrong! Try again. -5 points';
                messageDiv.className = 'message error';
                setTimeout(() => {
                    messageDiv.innerHTML = '';
                    canClick = true;
                }, 1500);
            }
        }
        
        // Start game
        generateQuestion();
    </script>
</body>
</html>
