<!DOCTYPE html><html><head><title>Parent Login</title><style>body{font-family:Segoe UI;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center}.card{background:white;padding:40px;border-radius:20px;width:350px}h2{color:#ff9800}input{width:100%;padding:12px;margin:10px0;border:1px solid #ddd;border-radius:10px}button{width:100%;padding:12px;background:#ff9800;color:white;border:none;border-radius:10px}.link{text-align:center;margin-top:15px}</style></head><body><div class="card"><h2>Parent Login</h2>{% if error %}<p style="color:red">{{ error }}</p>{% endif %}<form method="POST"><input name="username" placeholder="Username"><input type="password" name="password" placeholder="Password"><button type="submit">Login</button></form><div class="link"><a href="/parent/register">Create Account</a></div></div></body></html>
