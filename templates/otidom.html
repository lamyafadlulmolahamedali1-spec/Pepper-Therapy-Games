<!DOCTYPE html>
<html>
<head>
    <title>Otidom - Shape Match</title>
    <script src="/static/js/game-tracker.js"></script>
    <script src="/static/js/pepper-voice.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }
        h1 { color: #333; }
        .target { font-size: 8em; margin: 30px 0; padding: 30px; background: #f8f9fa; border-radius: 30px; }
        .options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin: 30px 0; }
        .option { padding: 30px; background: #f0f0f0; border-radius: 20px; cursor: pointer; font-size: 3em; }
        .back-btn { display: inline-block; margin-top: 20px; color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Otidom - Shape Match</h1>
        <div class="target" id="target">🔴</div>
        <div class="options" id="options"></div>
        <a href="/" class="back-btn">← Back</a>
    </div>
    <script>
        const stats = new GameStats('otidom');
        const shapes = ['🔴', '🔵', '🟢', '🟡'];
        let current = null;
        
        PepperVoice.speak("Match the shape! Click the matching one.");
        
        function next() {
            current = shapes[Math.floor(Math.random() * shapes.length)];
            document.getElementById('target').textContent = current;
            const options = [current];
            while(options.length < 4) {
                const r = shapes[Math.floor(Math.random() * shapes.length)];
                if(!options.includes(r)) options.push(r);
            }
            options.sort(() => Math.random() - 0.5);
            const div = document.getElementById('options');
            div.innerHTML = '';
            options.forEach(o => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = o;
                btn.onclick = () => check(o);
                div.appendChild(btn);
            });
        }
        
        function check(selected) {
            if(selected === current) {
                stats.addCorrect();
                PepperVoice.speak("Perfect match! Well done!");
                setTimeout(next, 1500);
            } else {
                stats.addWrong();
                PepperVoice.speak(`That's not the same shape. Find ${current}`);
            }
        }
        next();
    </script>
</body>
</html>
