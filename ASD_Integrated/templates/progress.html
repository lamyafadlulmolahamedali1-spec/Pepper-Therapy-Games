<!DOCTYPE html>
<html>
<head>
    <title>All Games Progress</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        .game-card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
            border-left: 5px solid #667eea;
        }
        .game-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 10px 0;
        }
        .stat {
            background: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-number {
            font-size: 1.8em;
            font-weight: bold;
        }
        .correct { color: #28a745; }
        .wrong { color: #dc3545; }
        .score { color: #ffc107; }
        .level { color: #17a2b8; }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 20px;
        }
        .clear-btn {
            background: #dc3545;
            margin-left: 10px;
        }
        .empty { text-align: center; padding: 50px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 All Games Progress</h1>
        <div id="progressData"></div>
        <div style="text-align: center;">
            <a href="/" class="back-btn">← Back to Games</a>
            <button onclick="clearAllData()" class="back-btn clear-btn">🗑️ Clear All</button>
        </div>
    </div>
    
    <script>
        function loadProgress() {
            const games = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('game_')) {
                    games.push(key);
                }
            }
            
            const container = document.getElementById('progressData');
            if (games.length === 0) {
                container.innerHTML = '<div class="empty">🎮 No game data yet. Play some games!</div>';
                return;
            }
            
            let html = '';
            for (const key of games.sort()) {
                const gameId = key.replace('game_', '');
                const data = JSON.parse(localStorage.getItem(key));
                const total = data.correct + data.wrong;
                const accuracy = total > 0 ? Math.round((data.correct / total) * 100) : 0;
                
                html += `
                    <div class="game-card">
                        <div class="game-title">🎮 ${gameId.replace(/_/g, ' ').toUpperCase()}</div>
                        <div class="stats">
                            <div class="stat"><div class="stat-number correct">${data.correct}</div><div>✅ Correct</div></div>
                            <div class="stat"><div class="stat-number wrong">${data.wrong}</div><div>❌ Wrong</div></div>
                            <div class="stat"><div class="stat-number score">${data.score}</div><div>⭐ Score</div></div>
                            <div class="stat"><div class="stat-number level">${data.level}</div><div>📈 Level</div></div>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${accuracy}%"></div></div>
                        <div style="display: flex; justify-content: space-between; font-size: 0.85em;">
                            <span>📊 Accuracy: ${accuracy}%</span>
                            <span>🕐 ${new Date(data.lastPlayed).toLocaleDateString()}</span>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        function clearAllData() {
            if (confirm('Clear ALL game progress?')) {
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith('game_')) {
                        localStorage.removeItem(key);
                    }
                }
                loadProgress();
            }
        }
        
        loadProgress();
    </script>
</body>
</html>
