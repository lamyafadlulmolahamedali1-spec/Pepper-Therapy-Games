            },
            
            // Learning Stories

                content: [

            },
            { 
                id: 27,

                level: 1, 
                description: "Learning the alphabet",
                content: [
                    "A is for Apple, so red and sweet.",

                ]
            },
            {

                description: "Discovering colors",
                content: [

                    "Yellow like the sun, warm and high.",
                    "Green like the grass, where butterflies fly.",
                    "Orange like a pumpkin, round and big.",
                    "Purple like grapes, sweet as a fig.",
                    "Colors are everywhere, look and see!",
                    "What's your favorite color? Tell me!"
                ]
            },
            { 
                id: 29, 
                title: "Shape Hunt", 
                emoji: "🔵🔺", 
                category: "learning", 
                age: "3-4", 
                pages: 8, 
                level: 1, 
                description: "Finding shapes everywhere",
                content: [
                    "A circle is round like a pizza pie.",

            {

                title: "Opposites Day", 
                emoji: "⬆️⬇️", 
                category: "learning", 
                age: "4-5", 
                pages: 9, 
                level: 1, 
                description: "Learning about opposites",
                content: [
                    "Up and down, high and low.",
                    "Fast and slow, stop and go.",
                    "Big and small, short and tall.",
                    "Hot and cold, young and old.",

                    "Open and close, stand and sit.",

                    "Can you think of more? It's your turn!"
                ]
            }
        ];
        
        // Generate 200+ stories by adding variations
        for (let i = 31; i <= 200; i++) {
            let baseStory = stories[Math.floor(Math.random() * 30)];
            stories.push({
                id: i,
                title: baseStory.title + " - Part " + (i - 20),
                emoji: baseStory.emoji,
                category: baseStory.category,
                age: baseStory.age,
                pages: baseStory.pages + Math.floor(Math.random() * 5),
                level: Math.floor(Math.random() * 3) + 1,
                description: baseStory.description + " - More fun!",
                content: baseStory.content.map(line => line + " " + Math.random().toString(36).substring(7))
            });
        }
        
        let currentPage = 1;
        let currentCategory = 'all';
        let currentSearch = '';
        let storiesPerPage = 12;
        let level = 1;
        let score = 0;
        let storiesRead = 0;
        let currentStory = null;
        let currentStoryPage = 0;
        
        function loadCategories() {
            let categories = ['all', 'adventure', 'animals', 'friendship', 'family', 'feelings', 'learning'];
            let html = '';
            categories.forEach(cat => {
                html += `<button class="category-btn ${cat === currentCategory ? 'active' : ''}" onclick="filterByCategory('${cat}')">${cat.charAt(0).toUpperCase() + cat.slice(1)}</button>`;
            });
            document.getElementById('categories').innerHTML = html;
        }
        
        function filterByCategory(category) {
            currentCategory = category;
            currentPage = 1;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderStories();
        }
        
        function searchStories() {
            currentSearch = document.getElementById('searchInput').value.toLowerCase();
            currentPage = 1;
            renderStories();
        }
        
        function renderStories() {
            let filtered = stories.filter(s => {
                let matchesCategory = currentCategory === 'all' || s.category === currentCategory;
                let matchesSearch = currentSearch === '' || 
                    s.title.toLowerCase().includes(currentSearch) || 
                    s.description.toLowerCase().includes(currentSearch);
                return matchesCategory && matchesSearch;
            });
            
            let start = (currentPage - 1) * storiesPerPage;
            let end = start + storiesPerPage;
            let pageStories = filtered.slice(start, end);
            
            let grid = document.getElementById('storiesGrid');
            grid.innerHTML = pageStories.map(s => `
                <div class="story-card" onclick="openStory(${s.id})">
                    <div class="story-emoji">${s.emoji}</div>
                    <div class="story-title">${s.title}</div>
                    <div class="story-description">${s.description}</div>
                    <div class="story-meta">
                        <span class="story-age">👶 Age ${s.age}</span>
                        <span class="story-pages">📖 ${s.pages} pages</span>
                        <span class="story-level">⭐ Level ${s.level}</span>
                    </div>
                </div>
            `).join('');
            
            renderPagination(filtered.length);
        }
        
        function renderPagination(total) {
            let totalPages = Math.ceil(total / storiesPerPage);
            let html = '';
            for (let i = 1; i <= totalPages && i <= 10; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            document.getElementById('pagination').innerHTML = html;
        }
        
        function goToPage(page) {
            currentPage = page;
            renderStories();
        }
        
        function openStory(id) {
            currentStory = stories.find(s => s.id === id);
            currentStoryPage = 0;
            document.getElementById('storyTitle').innerHTML = currentStory.title;
            updateStoryPage();
            document.getElementById('storyReader').style.display = 'flex';
            
            storiesRead++;
            score += 20 * level;
            
            let progress = (storiesRead % 10) * 10;
            document.getElementById('progressFill').style.width = progress + '%';
            
            if (storiesRead % 10 === 0) {
                level++;
                document.getElementById('levelDisplay').innerHTML = `🌟 Level ${level}`;
                showReward('🎉 Level Up! You read 10 stories!');
            }
            
            document.getElementById('scoreDisplay').innerHTML = `🏆 ${score}`;
            saveProgress();
        }
        
        function updateStoryPage() {
            document.getElementById('storyText').innerHTML = currentStory.content[currentStoryPage];
            document.getElementById('pageIndicator').innerHTML = `Page ${currentStoryPage + 1} of ${currentStory.pages}`;
        }
        
        function nextPage() {
            if (currentStoryPage < currentStory.content.length - 1) {
                currentStoryPage++;
                updateStoryPage();
            } else {
                closeStory();
                showReward('📚 Great reading! +20 points');
            }
        }
        
        function prevPage() {
            if (currentStoryPage > 0) {
                currentStoryPage--;
                updateStoryPage();
            }
        }
        
        function closeStory() {
            document.getElementById('storyReader').style.display = 'none';
        }
        
        function showReward(message) {
            let reward = document.createElement('div');
            reward.className = 'reward';
            reward.innerHTML = message;
            document.body.appendChild(reward);
            setTimeout(() => reward.remove(), 2000);
        }
        
        function saveProgress() {
            fetch('/api/progress/story_library', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ level: level, score: score, storiesRead: storiesRead })
            });
        }
        
        function loadProgress() {
            fetch('/api/progress/story_library')
                .then(res => res.json())
                .then(data => {
                    level = data.level || 1;
                    score = data.score || 0;
                    storiesRead = data.storiesRead || 0;
                    
                    document.getElementById('levelDisplay').innerHTML = `🌟 Level ${level}`;
                    document.getElementById('scoreDisplay').innerHTML = `🏆 ${score}`;
                    document.getElementById('progressFill').style.width = (storiesRead % 10) * 10 + '%';
                });
        }
        
        loadCategories();
        renderStories();
        loadProgress();
    </script>
