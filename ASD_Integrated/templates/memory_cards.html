<!DOCTYPE html>
<html>
<head>
    <title>Memory Cards</title>
    <script src="/static/js/game-tracker.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
        }
        h1 { text-align: center; color: #333; }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        .card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            cursor: pointer;
            transition: 0.3s;
        }
        .card.flipped {
            background: white;
            border: 3px solid #667eea;
        }
        .card.matched {
            background: #d4edda;
            cursor: default;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Memory Cards</h1>
        
        <div class="grid" id="grid"></div>
        
        <div style="text-align: center;">
            <button onclick="newGame()">🔄 New Game</button>
            <a href="/" class="back-btn" style="margin-left: 20px;">← Back to Games</a>
        </div>
    </div>
    
    <script>
        // Initialize tracker for this game
        const stats = new GameStats('memory_cards');
        
        let cards = [];
        let flipped = [];
        let canFlip = true;
        let pairs = 0;
        let matches = 0;
        
        const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
        
        function initGame() {
            const numPairs = 6;
            const selected = emojis.slice(0, numPairs);
            cards = [...selected, ...selected];
            // Shuffle
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            pairs = 0;
            matches = 0;
            flipped = [];
            canFlip = true;
            render();
        }
        
        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            cards.forEach((card, i) => {
                const div = document.createElement('div');
                div.className = 'card';
                if (flipped.includes(i)) div.classList.add('flipped');
                if (card === 'matched') div.classList.add('matched');
                div.textContent = flipped.includes(i) ? card : '?';
                div.onclick = () => flipCard(i);
                grid.appendChild(div);
            });
        }
        
        function flipCard(i) {
            if (!canFlip) return;
            if (flipped.includes(i)) return;
            if (cards[i] === 'matched') return;
            if (flipped.length >= 2) return;
            
            flipped.push(i);
            
            if (flipped.length === 2) {
                canFlip = false;
                setTimeout(checkMatch, 500);
            }
            render();
        }
        
        function checkMatch() {
            const [i, j] = flipped;
            if (cards[i] === cards[j]) {
                // CORRECT MATCH!
                cards[i] = 'matched';
                cards[j] = 'matched';
                pairs++;
                matches++;
                stats.addCorrect(); // Add correct for match
                
                if (pairs === 6) {
                    stats.levelUp(); // Level up when complete
                    setTimeout(() => {
                        alert('🎉 Great job! Starting next level!');
                        initGame();
                    }, 1000);
                }
            } else {
                // WRONG MATCH!
                stats.addWrong(); // Add wrong for mismatch
            }
            flipped = [];
            canFlip = true;
            render();
        }
        
        function newGame() {
            initGame();
        }
        
        initGame();
    </script>
<script src="/static/js/auto-tracker.js"></script>
</body>
</html>
