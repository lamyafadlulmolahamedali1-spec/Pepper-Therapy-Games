<!DOCTYPE html>
<html>
<head>
    <title>Do & Don't - Social Skills</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 2.8em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 30px;
            color: white;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
        }
        .stat-label {
            font-size: 1.1em;
            opacity: 0.9;
        }
        .scenario {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 40px;
            padding: 40px;
            margin: 40px 0;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .scenario-image {
            font-size: 8em;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .scenario-text {
            font-size: 2.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
        }
        .choices {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
            margin: 40px 0;
        }
        .choice-card {
            width: 350px;
            padding: 30px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.4s;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        .choice-card.do {
            background: linear-gradient(135deg, #a8e6cf 0%, #d4edda 100%);
            border: 5px solid #28a745;
        }
        .choice-card.dont {
            background: linear-gradient(135deg, #f8d7da 0%, #ffb3b3 100%);
            border: 5px solid #dc3545;
        }
        .choice-card:hover {
            transform: scale(1.05) translateY(-10px);
            box-shadow: 0 30px 50px rgba(0,0,0,0.2);
        }
        .choice-image {
            font-size: 6em;
            margin-bottom: 20px;
        }
        .choice-title {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .choice-desc {
            font-size: 1.3em;
            line-height: 1.6;
        }
        .feedback {
            margin: 30px 0;
            padding: 25px;
            border-radius: 50px;
            font-size: 1.8em;
            text-align: center;
            animation: slideIn 0.5s;
        }
        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border: 4px solid #28a745;
        }
        .feedback.wrong {
            background: #f8d7da;
            color: #721c24;
            border: 4px solid #dc3545;
        }
        .next-btn {
            padding: 20px 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            margin: 20px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }
        .next-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 20px 40px rgba(102,126,234,0.5);
        }
        .confetti {
            position: fixed;
            width: 15px;
            height: 15px;
            background: var(--color);
            animation: confettiFall 4s ease-out forwards;
            z-index: 9999;
            border-radius: 50%;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        @keyframes slideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤝 Do & Don't - Social Skills</h1>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">Level</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">Points</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="correct">0/10</div>
                <div class="stat-label">Correct</div>
            </div>
        </div>
        
        <div class="scenario" id="scenario">
            <div class="scenario-image" id="scenarioImage">👋</div>
            <div class="scenario-text" id="scenarioText">Your friend says hello. What should you do?</div>
        </div>
        
        <div class="choices">
            <div class="choice-card do" onclick="checkChoice('do')">
                <div class="choice-image">✅😊</div>
                <div class="choice-title">DO ✓</div>
                <div class="choice-desc" id="doText">Smile and say hello back</div>
            </div>
            <div class="choice-card dont" onclick="checkChoice('dont')">
                <div class="choice-image">❌😞</div>
                <div class="choice-title">DON'T ✗</div>
                <div class="choice-desc" id="dontText">Ignore them and walk away</div>
            </div>
        </div>
        
        <div class="feedback" id="feedback"></div>
        
        <div style="text-align: center;">
            <button class="next-btn" onclick="nextScenario()">🌟 Next Situation</button>
        </div>
    </div>
    
    <script>
        let level = 1;
        let score = 0;
        let correct = 0;
        let currentIndex = 0;
        let autoNext = true;
        
        const scenarios = [
            {
                image: '👋😊',
                question: 'Your friend says hello. What should you do?',
                do: 'Smile and say hello back 🤗',
                dont: 'Ignore them and walk away 😕',
                correct: 'do',
                doImage: '😊👋',
                dontImage: '😞🚶'
            },
            {
                image: '🧸😢',
                question: 'Your friend is sad and crying. What should you do?',
                do: 'Give them a hug and ask what\'s wrong 🤗',
                dont: 'Laugh at them or ignore them 😕',
                correct: 'do',
                doImage: '🤗💕',
                dontImage: '😞👎'
            },
            {
                image: '🎮🤝',
                question: 'You want to play with someone\'s toy. What should you do?',
                do: 'Ask nicely: "Can I please play?" 🗣️',
                dont: 'Grab the toy without asking 👎',
                correct: 'do',
                doImage: '🙏🎮',
                dontImage: '👊🚫'
            },
            {
                image: '🧹💪',
                question: 'Your mom is cleaning the house. What should you do?',
                do: 'Offer to help her 🙋',
                dont: 'Make more mess and run away 😕',
                correct: 'do',
                doImage: '🧹❤️',
                dontImage: '💨😞'
            },
            {
                image: '🗑️🌍',
                question: 'You see trash on the ground. What should you do?',
                do: 'Pick it up and throw it in the bin 🌍',
                dont: 'Walk past and leave it there 😕',
                correct: 'do',
                doImage: '🗑️✅',
                dontImage: '👎🌍'
            },
            {
                image: '👧😠',
                question: 'Someone is being mean to you. What should you do?',
                do: 'Walk away and tell a grown-up 👨‍👩‍👧',
                dont: 'Be mean back to them 😠',
                correct: 'do',
                doImage: '🚶👨‍👩‍👧',
                dontImage: '😠👊'
            },
            {
                image: '🎁🎂',
                question: 'Someone gives you a gift. What should you do?',
                do: 'Say "Thank you!" with a smile 😊',
                dont: 'Take it and walk away without saying anything 😕',
                correct: 'do',
                doImage: '🎁😊',
                dontImage: '🎁😞'
            },
            {
                image: '👂📢',
                question: 'The teacher is talking. What should you do?',
                do: 'Listen quietly and wait for your turn 👂',
                dont: 'Talk while teacher is talking 🗣️',
                correct: 'do',
                doImage: '👂✅',
                dontImage: '🗣️❌'
            },
            {
                image: '🤧😷',
                question: 'You need to cough or sneeze. What should you do?',
                do: 'Cover your mouth with your elbow 🤧',
                dont: 'Cough on others around you 😷',
                correct: 'do',
                doImage: '🤧💪',
                dontImage: '😷👎'
            },
            {
                image: '🖍️🎨',
                question: 'You want to use the red crayon someone else is using. What should you do?',
                do: 'Wait patiently for your turn ⏳',
                dont: 'Snatch it from their hand 👎',
                correct: 'do',
                doImage: '⏳🎨',
                dontImage: '👊🖍️'
            }
        ];
        
        function displayScenario() {
            const scenario = scenarios[currentIndex % scenarios.length];
            document.getElementById('scenarioImage').textContent = scenario.image;
            document.getElementById('scenarioText').textContent = scenario.question;
            document.getElementById('doText').innerHTML = `${scenario.doImage} ${scenario.do}`;
            document.getElementById('dontText').innerHTML = `${scenario.dontImage} ${scenario.dont}`;
            document.getElementById('feedback').innerHTML = '';
        }
        
        function checkChoice(choice) {
            const scenario = scenarios[currentIndex % scenarios.length];
            const feedback = document.getElementById('feedback');
            
            if (choice === scenario.correct) {
                // Correct choice
                score += 10 * level;
                correct++;
                feedback.innerHTML = '✅ EXCELLENT! That\'s the right choice! 🌟';
                feedback.className = 'feedback correct';
                celebrate();
                
                if (correct % 5 === 0) {
                    level++;
                    feedback.innerHTML += ' 🎉 LEVEL UP! 🎉';
                }
                
                if (autoNext) {
                    setTimeout(() => {
                        nextScenario();
                    }, 2000);
                }
            } else {
                // Wrong choice
                score = Math.max(0, score - 5);
                feedback.innerHTML = '❌ Think again! What would be the best choice? 🤔';
                feedback.className = 'feedback wrong';
            }
            
            updateStats();
        }
        
        function nextScenario() {
            currentIndex++;
            displayScenario();
        }
        
        function celebrate() {
            for(let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = `hsl(${Math.random() * 360}, 70%, 50%)`;
                    confetti.style.width = Math.random() * 15 + 5 + 'px';
                    confetti.style.height = confetti.style.width;
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 50);
            }
        }
        
        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            document.getElementById('correct').textContent = correct + '/10';
        }
        
        displayScenario();
    </script>
</body>
</html>
