<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Game - Infinite Items</title>
    <style>
        body { font-family: Arial; background: linear-gradient(135deg, #FF6B6B, #4ECDC4); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .game-area { background: white; border-radius: 30px; padding: 30px; }
        .sorting-container { display: flex; gap: 20px; margin: 30px 0; }
        .box { flex: 1; background: #f0f0f0; border-radius: 20px; padding: 20px; min-height: 400px; border: 3px dashed #4CAF50; }
        .box h3 { text-align: center; margin-bottom: 20px; }
        .items-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; min-height: 300px; }
        .item { background: white; border-radius: 15px; padding: 15px; font-size: 2em; cursor: grab; border: 2px solid #ddd; }
        .score-board { background: #4CAF50; color: white; padding: 15px 30px; border-radius: 30px; }
        .level-badge { background: #FF9800; color: white; padding: 10px 25px; border-radius: 25px; margin-right: 15px; }
        .back-btn { background: #f44336; color: white; padding: 10px 25px; border-radius: 30px; text-decoration: none; }
        .reward { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 4em; background: white; padding: 30px; border-radius: 60px; animation: pop 0.5s; z-index: 1000; }
        @keyframes pop { 0%{transform:translate(-50%,-50%) scale(0)} 100%{transform:translate(-50%,-50%) scale(1)} }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <span class="level-badge" id="levelDisplay">Level 1</span>
                <span class="score-board" id="score">0</span>
            </div>
            <h1>📦 Sorting Game</h1>
            <a href="/child/dashboard" class="back-btn">🔙 Back</a>
        </div>
        <div class="game-area">
            <div class="sorting-container">
                <div class="box" id="box1" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <h3 id="box1Title">🍎 Fruits</h3>
                    <div class="items-container" id="box1Items"></div>
                </div>
                <div class="box" id="box2" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <h3 id="box2Title">🦁 Animals</h3>
                    <div class="items-container" id="box2Items"></div>
                </div>
            </div>
            <div class="items-container" id="itemsPool" style="background:#f0f0f0; padding:20px; border-radius:20px; margin-top:20px;"></div>
        </div>
    </div>
    <script>
        const categories = [
            {
                name: 'Fruits vs Animals',
                box1: { name: 'Fruits', emoji: '🍎' },
                box2: { name: 'Animals', emoji: '🦁' },
                items: [
                    { emoji: '🍎', name: 'Apple', cat: 1 },
                    { emoji: '🍌', name: 'Banana', cat: 1 },
                    { emoji: '🍊', name: 'Orange', cat: 1 },
                    { emoji: '🍓', name: 'Strawberry', cat: 1 },
                    { emoji: '🦁', name: 'Lion', cat: 2 },
                    { emoji: '🐘', name: 'Elephant', cat: 2 },
                    { emoji: '🐒', name: 'Monkey', cat: 2 },
                    { emoji: '🐧', name: 'Penguin', cat: 2 }
                ]
            },
            {
                name: 'Food vs Drinks',
                box1: { name: 'Food', emoji: '🍔' },
                box2: { name: 'Drinks', emoji: '🥤' },
                items: [
                    { emoji: '🍔', name: 'Burger', cat: 1 },
                    { emoji: '🍕', name: 'Pizza', cat: 1 },
                    { emoji: '🍟', name: 'Fries', cat: 1 },
                    { emoji: '🥤', name: 'Soda', cat: 2 },
                    { emoji: '🧃', name: 'Juice', cat: 2 },
                    { emoji: '🥛', name: 'Milk', cat: 2 }
                ]
            },
            {
                name: 'Vehicles vs Toys',
                box1: { name: 'Vehicles', emoji: '🚗' },
                box2: { name: 'Toys', emoji: '🧸' },
                items: [
                    { emoji: '🚗', name: 'Car', cat: 1 },
                    { emoji: '✈️', name: 'Plane', cat: 1 },
                    { emoji: '🚂', name: 'Train', cat: 1 },
                    { emoji: '🧸', name: 'Teddy', cat: 2 },
                    { emoji: '🎮', name: 'Game', cat: 2 },
                    { emoji: '🪀', name: 'Yo-yo', cat: 2 }
                ]
            }
        ];

        let level = 1;
        let score = 0;
        let currentCat = 0;
        let items = [];

        function playSound(text) {
            try {
                let utterance = new SpeechSynthesisUtterance(text);
                window.speechSynthesis.speak(utterance);
            } catch(e) {}
        }

        function showConfetti() {
            for(let i=0; i<30; i++) {
                let confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.left = Math.random()*100 + '%';
                confetti.style.top = '-10px';
                confetti.style.color = ['#4CAF50','#2196F3','#FF9800','#f44336'][Math.floor(Math.random()*4)];
                confetti.style.fontSize = '20px';
                confetti.textContent = ['✨','🎉','⭐','🌟'][Math.floor(Math.random()*4)];
                confetti.style.animation = `fall ${Math.random()*2+1}s linear`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function newRound() {
            currentCat = (level - 1) % categories.length;
            let cat = categories[currentCat];
            
            document.getElementById('box1Title').innerHTML = `${cat.box1.emoji} ${cat.box1.name}`;
            document.getElementById('box2Title').innerHTML = `${cat.box2.emoji} ${cat.box2.name}`;
            
            document.getElementById('box1Items').innerHTML = '';
            document.getElementById('box2Items').innerHTML = '';
            
            items = [];
            for(let i=0; i<5+level; i++) {
                items.push({...cat.items[Math.floor(Math.random()*cat.items.length)], id: i});
            }
            renderItems();
        }

        function renderItems() {
            document.getElementById('itemsPool').innerHTML = items.map((item,i) => 
                `<div class="item" draggable="true" ondragstart="drag(event, ${i})">${item.emoji}</div>`
            ).join('');
        }

        function allowDrop(e) { e.preventDefault(); }

        function drag(e, i) {
            e.dataTransfer.setData('text', i);
            e.dataTransfer.setData('cat', items[i].cat);
        }

        function drop(e) {
            e.preventDefault();
            let i = e.dataTransfer.getData('text');
            let cat = e.dataTransfer.getData('cat');
            let box = e.target.closest('.box')?.id;
            
            if((box === 'box1' && cat == 1) || (box === 'box2' && cat == 2)) {
                document.getElementById(box + 'Items').innerHTML += `<div class="item">${items[i].emoji}</div>`;
                items.splice(i,1);
                renderItems();
                score += 10 * level;
                document.getElementById('score').textContent = score;
                showReward('✅ Correct!');
                playSound('Great sorting!');
                
                if(items.length === 0) {
                    level++;
                    document.getElementById('levelDisplay').textContent = 'Level ' + level;
                    showReward('🌟 Level Up!');
                    playSound('Level Up!');
                    showConfetti();
                    setTimeout(newRound, 1000);
                }
            }
        }

        function showReward(msg) {
            let r = document.createElement('div');
            r.className = 'reward';
            r.textContent = msg;
            document.body.appendChild(r);
            setTimeout(() => r.remove(), 1500);
        }

        newRound();
    </script>
    <style>
        @keyframes fall {
            to { transform: translateY(100vh); }
        }
    </style>
</body>
</html>
