<!DOCTYPE html>
<html>
<head>
    <title>My Daily Routine - TEACCH Schedule</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #43a047 0%, #1e88e5 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            font-size: 3em;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #43a047, #1e88e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .time-display {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 50px;
            text-align: center;
            margin: 30px 0;
            font-size: 2em;
            border: 3px solid #43a047;
        }
        
        .routine-section {
            margin: 40px 0;
        }
        
        .section-title {
            font-size: 2em;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .task-card {
            background: #f8f9fa;
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 4px solid transparent;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .task-card:hover {
            transform: translateY(-10px);
            border-color: #43a047;
        }
        
        .task-card.completed {
            background: #d4edda;
            opacity: 0.8;
            border-color: #28a745;
        }
        
        .task-icon {
            font-size: 4em;
            margin-bottom: 15px;
        }
        
        .task-name {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .task-time {
            color: #666;
            margin-bottom: 10px;
        }
        
        .task-points {
            background: gold;
            color: #333;
            padding: 5px 15px;
            border-radius: 50px;
            display: inline-block;
            font-weight: bold;
        }
        
        .progress-bar {
            width: 100%;
            height: 25px;
            background: #f0f0f0;
            border-radius: 50px;
            margin: 30px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #43a047, #1e88e5);
            width: 0%;
            transition: width 0.5s;
        }
        
        .next-day-btn {
            display: block;
            margin: 40px auto;
            padding: 20px 60px;
            background: linear-gradient(135deg, #43a047, #1e88e5);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .next-day-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .confetti {
            position: fixed;
            width: 15px;
            height: 15px;
            background: var(--color);
            animation: confettiFall 4s ease-out forwards;
            z-index: 9999;
            border-radius: 50%;
        }
        
        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 My Daily Routine - TEACCH System</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="day">1</div>
                <div class="stat-label">Day</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="points">0</div>
                <div class="stat-label">Points</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">Streak</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">Level</div>
            </div>
        </div>
        
        <div class="time-display" id="timeDisplay">
            🌅 Morning Routine
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
        
        <div class="routine-section">
            <div class="section-title">
                <span>🌅 Morning (6:00 - 12:00)</span>
            </div>
            <div class="tasks-grid" id="morningTasks"></div>
        </div>
        
        <div class="routine-section">
            <div class="section-title">
                <span>☀️ Afternoon (12:00 - 5:00)</span>
            </div>
            <div class="tasks-grid" id="afternoonTasks"></div>
        </div>
        
        <div class="routine-section">
            <div class="section-title">
                <span>🌙 Evening (5:00 - 9:00)</span>
            </div>
            <div class="tasks-grid" id="eveningTasks"></div>
        </div>
        
        <button class="next-day-btn" onclick="nextDay()">🌟 Next Day</button>
    </div>
    
    <script>
        let day = 1;
        let points = 0;
        let streak = 0;
        let level = 1;
        let completedTasks = 0;
        const totalTasks = 12;
        
        const morningTasks = [
            {icon: '🌅', name: 'Wake Up', time: '6:30 AM', points: 5, done: false},
            {icon: '🚽', name: 'Use Toilet', time: '6:35 AM', points: 5, done: false},
            {icon: '🪥', name: 'Brush Teeth', time: '6:40 AM', points: 10, done: false},
            {icon: '🧼', name: 'Wash Face', time: '6:45 AM', points: 5, done: false},
            {icon: '👕', name: 'Get Dressed', time: '6:50 AM', points: 5, done: false},
            {icon: '🛏️', name: 'Make Bed', time: '7:00 AM', points: 10, done: false},
            {icon: '🥣', name: 'Breakfast', time: '7:30 AM', points: 10, done: false},
            {icon: '📚', name: 'Learning Time', time: '9:00 AM', points: 20, done: false}
        ];
        
        const afternoonTasks = [
            {icon: '🍎', name: 'Lunch', time: '12:00 PM', points: 10, done: false},
            {icon: '😴', name: 'Rest Time', time: '1:00 PM', points: 10, done: false},
            {icon: '🎨', name: 'Creative Play', time: '2:00 PM', points: 15, done: false},
            {icon: '🏃', name: 'Exercise', time: '3:00 PM', points: 15, done: false},
            {icon: '🧩', name: 'Puzzles', time: '4:00 PM', points: 20, done: false}
        ];
        
        const eveningTasks = [
            {icon: '🏠', name: 'Go Home', time: '5:00 PM', points: 5, done: false},
            {icon: '👕', name: 'Change Clothes', time: '5:15 PM', points: 5, done: false},
            {icon: '📖', name: 'Homework', time: '5:30 PM', points: 20, done: false},
            {icon: '👨‍👩‍👧', name: 'Family Time', time: '6:30 PM', points: 15, done: false},
            {icon: '🍽️', name: 'Dinner', time: '7:30 PM', points: 10, done: false},
            {icon: '🛁', name: 'Bath Time', time: '8:00 PM', points: 10, done: false},
            {icon: '📖', name: 'Story Time', time: '8:30 PM', points: 15, done: false},
            {icon: '😴', name: 'Bedtime', time: '9:00 PM', points: 10, done: false}
        ];
        
        function displayTasks() {
            displaySection('morningTasks', morningTasks);
            displaySection('afternoonTasks', afternoonTasks);
            displaySection('eveningTasks', eveningTasks);
            updateTimeDisplay();
        }
        
        function displaySection(elementId, tasks) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';
            
            tasks.forEach((task, index) => {
                const card = document.createElement('div');
                card.className = 'task-card' + (task.done ? ' completed' : '');
                card.onclick = () => completeTask(card, tasks, index);
                card.innerHTML = `
                    <div class="task-icon">${task.icon}</div>
                    <div class="task-name">${task.name}</div>
                    <div class="task-time">${task.time}</div>
                    <div class="task-points">+${task.points} pts</div>
                `;
                container.appendChild(card);
            });
        }
        
        function completeTask(card, tasks, index) {
            if (!tasks[index].done) {
                tasks[index].done = true;
                card.classList.add('completed');
                points += tasks[index].points;
                completedTasks++;
                
                if (completedTasks % 5 === 0) {
                    level++;
                }
                
                updateStats();
                createConfetti();
                
                if (completedTasks === totalTasks) {
                    streak++;
                    celebrate();
                }
            }
        }
        
        function updateStats() {
            document.getElementById('points').textContent = points;
            document.getElementById('level').textContent = level;
            document.getElementById('streak').textContent = streak;
            document.getElementById('day').textContent = day;
            
            const percentage = (completedTasks / totalTasks) * 100;
            document.getElementById('progress').style.width = percentage + '%';
        }
        
        function updateTimeDisplay() {
            const times = ['🌅 Morning', '☀️ Afternoon', '🌙 Evening'];
            const index = Math.floor(Math.random() * 3);
            document.getElementById('timeDisplay').innerHTML = times[index] + ' Routine';
        }
        
        function createConfetti() {
            for(let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = `hsl(${Math.random() * 360}, 70%, 50%)`;
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 50);
            }
        }
        
        function celebrate() {
            createConfetti();
            createConfetti();
        }
        
        function nextDay() {
            day++;
            completedTasks = 0;
            
            // Reset all tasks
            morningTasks.forEach(t => t.done = false);
            afternoonTasks.forEach(t => t.done = false);
            eveningTasks.forEach(t => t.done = false);
            
            displayTasks();
            updateStats();
            createConfetti();
        }
        
        displayTasks();
    </script>
</body>
</html>
