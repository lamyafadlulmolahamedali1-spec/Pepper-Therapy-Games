<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Spinner - Fun Movement Games</title>
    <style>
        body { font-family: Arial; background: linear-gradient(135deg, #FFD700, #FFA500); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .game-area { background: white; border-radius: 30px; padding: 30px; text-align: center; }
        
        .spinner-wrapper { position: relative; width: 500px; height: 500px; margin: 0 auto; }
        .spinner { width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(
            #FF6B6B 0deg 45deg,
            #4ECDC4 45deg 90deg,
            #45B7D1 90deg 135deg,
            #96CEB4 135deg 180deg,
            #FFEEAD 180deg 225deg,
            #D4A5A5 225deg 270deg,
            #9B59B6 270deg 315deg,
            #3498DB 315deg 360deg
        ); cursor: pointer; box-shadow: 0 20px 40px rgba(0,0,0,0.3); transition: transform 0.1s linear; position: relative; z-index: 2; }
        .spinner.spinning { animation: spinAnimation linear infinite; }
        @keyframes spinAnimation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .spinner-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 120px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3em; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 3; border: 4px solid #FF9800; }
        .spinner-arrow { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 4em; z-index: 4; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3)); }
        
        .activities-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin: 40px 0; }
        .activity-card { background: linear-gradient(145deg, #ffffff, #f5f5f5); border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 3px solid transparent; transition: all 0.3s; }
        .activity-card.active { border-color: #4CAF50; transform: scale(1.05); background: #e8f5e8; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1.05)} 50%{transform:scale(1.1)} }
        .activity-emoji { font-size: 4em; margin-bottom: 10px; }
        .activity-name { font-size: 1.3em; font-weight: bold; }
        
        .current-activity { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 30px; border-radius: 30px; margin: 30px 0; animation: glow 2s infinite; }
        @keyframes glow { 0%,100%{box-shadow:0 0 20px #667eea} 50%{box-shadow:0 0 40px #764ba2} }
        .current-emoji { font-size: 6em; margin-bottom: 10px; }
        .current-name { font-size: 2.5em; font-weight: bold; margin-bottom: 10px; }
        .current-instruction { font-size: 1.3em; opacity: 0.9; }
        
        .action-buttons { display: flex; gap: 20px; justify-content: center; margin: 30px; }
        .action-btn { padding: 20px 50px; border: none; border-radius: 60px; font-size: 1.5em; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .action-btn.spin { background: #4CAF50; color: white; }
        .action-btn.complete { background: #2196F3; color: white; }
        .action-btn:hover { transform: scale(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        .history { background: #f5f5f5; border-radius: 20px; padding: 20px; margin-top: 30px; }
        .history-list { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 15px; }
        .history-item { background: white; padding: 15px 25px; border-radius: 50px; display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 10px rgba(0,0,0,0.1); animation: slideIn 0.3s; }
        @keyframes slideIn { from{transform:translateX(-50px); opacity:0} to{transform:translateX(0); opacity:1} }
        
        .score-board { background: #4CAF50; color: white; padding: 15px 30px; border-radius: 30px; }
        .level-badge { background: #FF9800; color: white; padding: 10px 25px; border-radius: 25px; margin-right: 15px; }
        .back-btn { background: #f44336; color: white; padding: 10px 25px; border-radius: 30px; text-decoration: none; }
        .reward { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 4em; background: white; padding: 30px; border-radius: 60px; animation: pop 0.5s; z-index: 1000; }
        @keyframes pop { 0%{transform:translate(-50%,-50%) scale(0)} 100%{transform:translate(-50%,-50%) scale(1)} }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <span class="level-badge" id="levelDisplay">Level 1</span>
                <span class="score-board" id="score">0</span>
            </div>
            <h1>🌀 Activity Spinner</h1>
            <a href="/child/dashboard" class="back-btn">🔙 Back</a>
        </div>

        <div class="game-area">
            <div class="spinner-wrapper">
                <div class="spinner-arrow">⬇️</div>
                <div class="spinner" id="spinner" onclick="startSpin()"></div>
                <div class="spinner-center" id="spinnerCenter">🌀</div>
            </div>

            <div class="activities-grid" id="activitiesGrid"></div>

            <div class="current-activity" id="currentActivity">
                <div class="current-emoji">🎲</div>
                <div class="current-name">Spin the wheel!</div>
                <div class="current-instruction">Click the spinner to start</div>
            </div>

            <div class="action-buttons">
                <button class="action-btn spin" onclick="startSpin()" id="spinBtn">🌀 Spin</button>
                <button class="action-btn complete" onclick="completeActivity()" id="completeBtn" style="display:none;">✅ I Did It!</button>
            </div>

            <div class="history">
                <h3>📋 Activity History</h3>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
    </div>

    <script>
        const activities = [
            { id: 1, emoji: '🦘', name: 'Jump', instruction: 'Jump 5 times!', points: 15 },
            { id: 2, emoji: '💃', name: 'Dance', instruction: 'Dance for 10 seconds!', points: 20 },
            { id: 3, emoji: '🎤', name: 'Sing', instruction: 'Sing your favorite song!', points: 25 },
            { id: 4, emoji: '🎁', name: 'Surprise', instruction: 'You got a surprise gift!', points: 50 },
            { id: 5, emoji: '🎮', name: 'Play', instruction: 'Play any game for 2 minutes!', points: 30 },
            { id: 6, emoji: '🤸', name: 'Stretch', instruction: 'Touch your toes 3 times!', points: 15 },
            { id: 7, emoji: '🏃', name: 'Run', instruction: 'Run in place for 15 seconds!', points: 20 },
            { id: 8, emoji: '🧘', name: 'Breathe', instruction: 'Take 5 deep breaths', points: 10 },
            { id: 9, emoji: '🤲', name: 'Pray', instruction: 'Close your eyes and pray', points: 15 },
            { id: 10, emoji: '🧎', name: 'Kneel', instruction: 'Kneel down for 10 seconds', points: 15 },
            { id: 11, emoji: '🙏', name: 'Thank', instruction: 'Say thank you to someone', points: 20 },
            { id: 12, emoji: '💪', name: 'Exercise', instruction: 'Do 5 push-ups!', points: 25 },
            { id: 13, emoji: '🧠', name: 'Think', instruction: 'Think of something happy', points: 10 },
            { id: 14, emoji: '❤️', name: 'Love', instruction: 'Give a hug to someone', points: 30 },
            { id: 15, emoji: '🤝', name: 'Help', instruction: 'Help someone today', points: 35 },
            { id: 16, emoji: '🎨', name: 'Draw', instruction: 'Draw a picture', points: 25 }
        ];

        let level = 1;
        let score = 0;
        let spinning = false;
        let currentActivity = null;
        let history = [];

        function playSound(text) {
            try {
                let utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                utterance.pitch = 1.2;
                window.speechSynthesis.speak(utterance);
            } catch(e) {}
        }

        function saveProgress() {
            fetch('/api/progress/sensory_spinner', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ level: level, score: score })
            });
        }

        function renderActivities() {
            let grid = document.getElementById('activitiesGrid');
            grid.innerHTML = activities.map(a => 
                `<div class="activity-card" id="activity-${a.id}">
                    <div class="activity-emoji">${a.emoji}</div>
                    <div class="activity-name">${a.name}</div>
                </div>`
            ).join('');
        }

        function startSpin() {
            if(spinning) {
                stopSpin();
                return;
            }
            
            spinning = true;
            let speed = 10 + Math.random() * 20;
            let spinner = document.getElementById('spinner');
            spinner.classList.add('spinning');
            spinner.style.animationDuration = (1/speed) + 's';
            
            document.getElementById('spinBtn').textContent = '⏹️ Stop';
            document.getElementById('completeBtn').style.display = 'none';
            
            setTimeout(() => {
                if(spinning) stopSpin();
            }, 2000 + Math.random() * 2000);
        }

        function stopSpin() {
            if(!spinning) return;
            spinning = false;
            
            let spinner = document.getElementById('spinner');
            spinner.classList.remove('spinning');
            
            let index = Math.floor(Math.random() * activities.length);
            currentActivity = activities[index];
            
            document.getElementById('currentActivity').innerHTML = `
                <div class="current-emoji">${currentActivity.emoji}</div>
                <div class="current-name">${currentActivity.name}</div>
                <div class="current-instruction">${currentActivity.instruction}</div>
            `;
            
            document.getElementById('spinBtn').textContent = '🌀 Spin';
            document.getElementById('completeBtn').style.display = 'inline-block';
            playSound(currentActivity.instruction);
            
            document.querySelectorAll('.activity-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`activity-${currentActivity.id}`).classList.add('active');
        }

        function completeActivity() {
            if(!currentActivity) return;
            
            let points = currentActivity.points * level;
            score += points;
            
            history.unshift({
                emoji: currentActivity.emoji,
                name: currentActivity.name,
                points: points
            });
            
            if(history.length > 10) history.pop();
            
            if(Math.random() < 0.2) {
                level++;
                document.getElementById('levelDisplay').textContent = 'Level ' + level;
                showReward('🌟 Level Up!');
                playSound('Level Up! You are amazing!');
            }
            
            showReward(`✅ +${points} points!`);
            playSound('Great job! You did it!');
            
            document.getElementById('score').textContent = score;
            renderHistory();
            saveProgress();
            
            currentActivity = null;
            document.getElementById('currentActivity').innerHTML = `
                <div class="current-emoji">🎲</div>
                <div class="current-name">Spin the wheel!</div>
                <div class="current-instruction">Click the spinner to start</div>
            `;
            
            document.getElementById('completeBtn').style.display = 'none';
            document.querySelectorAll('.activity-card').forEach(c => c.classList.remove('active'));
        }

        function renderHistory() {
            let list = document.getElementById('historyList');
            list.innerHTML = history.map(h => 
                `<div class="history-item">
                    <span>${h.emoji}</span>
                    <span>${h.name}</span>
                    <span style="color:#4CAF50;">+${h.points}</span>
                </div>`
            ).join('');
        }

        function showReward(msg) {
            let r = document.createElement('div');
            r.className = 'reward';
            r.textContent = msg;
            document.body.appendChild(r);
            setTimeout(() => r.remove(), 1500);
        }

        function loadProgress() {
            fetch('/api/progress/sensory_spinner')
                .then(res => res.json())
                .then(data => {
                    level = data.level || 1;
                    score = data.score || 0;
                    document.getElementById('levelDisplay').textContent = 'Level ' + level;
                    document.getElementById('score').textContent = score;
                });
        }

        renderActivities();
        loadProgress();
    </script>
</body>
</html>
