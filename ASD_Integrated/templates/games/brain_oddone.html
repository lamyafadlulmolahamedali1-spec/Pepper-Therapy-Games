<!DOCTYPE html>
<html>
<head>
    <title>Odd One Out</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .level-info {
            text-align: center;
            font-size: 1.5em;
            margin: 20px;
            color: #667eea;
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            margin: 50px 0;
        }
        .item-card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 4px solid transparent;
        }
        .item-card:hover {
            transform: scale(1.05);
        }
        .item-card.correct {
            background: #d4edda;
            border-color: #28a745;
        }
        .item-card.wrong {
            background: #f8d7da;
            border-color: #dc3545;
        }
        .item-icon {
            font-size: 5em;
            margin-bottom: 15px;
        }
        .item-name {
            font-size: 1.3em;
        }
        .message {
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.3em;
            margin: 20px 0;
        }
        .next-btn {
            display: block;
            margin: 30px auto;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.3em;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤔 Odd One Out</h1>
        
        <div class="level-info">Level <span id="level">1</span></div>
        
        <div class="items-grid" id="itemsGrid"></div>
        <div class="message" id="message"></div>
        
        <button class="next-btn" onclick="nextLevel()">Next Level</button>
    </div>
    
    <script>
        let level = 1;
        let oddIndex = 0;
        
        const categories = [
            {name: 'Animals', items: ['🐶', '🐱', '🐭', '🚗'], odd: 3, oddName: 'Car'},
            {name: 'Fruits', items: ['🍎', '🍌', '🍊', '📚'], odd: 3, oddName: 'Book'},
            {name: 'Colors', items: ['🔴', '🔵', '🟢', '🐘'], odd: 3, oddName: 'Elephant'},
            {name: 'Vehicles', items: ['🚗', '🚲', '✈️', '🍕'], odd: 3, oddName: 'Pizza'},
            {name: 'Toys', items: ['🧸', '🎮', '🚂', '🌳'], odd: 3, oddName: 'Tree'}
        ];
        
        function generateLevel() {
            const category = categories[Math.floor(Math.random() * categories.length)];
            const items = [...category.items];
            oddIndex = category.odd;
            
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = '';
            
            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.onclick = () => checkAnswer(index);
                card.innerHTML = `
                    <div class="item-icon">${item}</div>
                    <div class="item-name">Item ${index + 1}</div>
                `;
                grid.appendChild(card);
            });
            
            document.getElementById('message').innerHTML = 'Find the odd one out!';
        }
        
        function checkAnswer(index) {
            const cards = document.querySelectorAll('.item-card');
            const message = document.getElementById('message');
            
            if (index === oddIndex) {
                cards[index].classList.add('correct');
                message.innerHTML = '✅ Correct! Great job!';
                message.style.color = '#28a745';
                createConfetti();
            } else {
                cards[index].classList.add('wrong');
                cards[oddIndex].classList.add('correct');
                message.innerHTML = '❌ Try again! The odd one was different.';
                message.style.color = '#dc3545';
            }
            
            // Disable further clicks
            cards.forEach(card => card.style.pointerEvents = 'none');
        }
        
        function createConfetti() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = `hsl(${Math.random() * 360}, 70%, 50%)`;
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 50);
            }
        }
        
        function nextLevel() {
            level++;
            document.getElementById('level').textContent = level;
            generateLevel();
        }
        
        generateLevel();
    </script>
</body>
</html>
