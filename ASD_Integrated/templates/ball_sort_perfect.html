<!DOCTYPE html>
<html>
<head>
    <title>Ball Sort</title>
    <script src="/static/js/game-tracker.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
        }
        h1 { text-align: center; color: #333; }
        .tubes {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
        }
        .tube {
            width: 100px;
            height: 350px;
            border: 4px solid #333;
            border-radius: 0 0 30px 30px;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            background: #f0f0f0;
            cursor: pointer;
        }
        .tube.selected { border-color: gold; }
        .ball {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            margin: 3px 0;
        }
        .ball.red { background: #ff4757; }
        .ball.blue { background: #1e90ff; }
        .ball.green { background: #2ed573; }
        button {
            padding: 10px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .message { text-align: center; padding: 15px; border-radius: 20px; margin: 20px 0; }
        .back-btn { display: inline-block; margin-top: 20px; color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Ball Sort</h1>
        <div class="tubes" id="tubes"></div>
        <div class="message" id="message"></div>
        <div style="text-align: center;">
            <button onclick="newGame()">New Game</button>
            <a href="/" class="back-btn" style="margin-left: 20px;">← Back</a>
        </div>
    </div>
    
    <script>
        const stats = new GameStats('ball_sort');
        let tubes = [];
        let selected = null;
        let level = 1;
        
        function initGame() {
            if (level === 1) {
                tubes = [['red','red','blue'], ['blue','blue','red'], []];
            } else {
                tubes = [['red','red','blue','blue'], ['blue','blue','red','red'], [], []];
            }
            selected = null;
            render();
        }
        
        function render() {
            const container = document.getElementById('tubes');
            container.innerHTML = '';
            tubes.forEach((tube, i) => {
                const tubeDiv = document.createElement('div');
                tubeDiv.className = 'tube' + (selected === i ? ' selected' : '');
                tubeDiv.onclick = () => selectTube(i);
                tube.forEach(ball => {
                    const ballDiv = document.createElement('div');
                    ballDiv.className = 'ball ' + ball;
                    tubeDiv.appendChild(ballDiv);
                });
                for(let j = tube.length; j < 4; j++) {
                    const empty = document.createElement('div');
                    empty.style.height = '75px';
                    empty.style.width = '75px';
                    tubeDiv.appendChild(empty);
                }
                container.appendChild(tubeDiv);
            });
        }
        
        function selectTube(i) {
            if (selected === null) {
                if (tubes[i].length > 0) selected = i;
            } else {
                if (selected !== i && tubes[i].length < 4) {
                    moveBall(selected, i);
                }
                selected = null;
            }
            render();
        }
        
        function moveBall(from, to) {
            const ball = tubes[from][tubes[from].length - 1];
            if (tubes[to].length > 0) {
                const top = tubes[to][tubes[to].length - 1];
                if (top !== ball) return;
            }
            tubes[from].pop();
            tubes[to].push(ball);
            
            // Check win
            let win = true;
            tubes.forEach(tube => {
                if (tube.length > 0) {
                    const first = tube[0];
                    if (!tube.every(b => b === first)) win = false;
                }
            });
            
            if (win) {
                stats.addCorrect();  // TRACK SUCCESSFUL LEVEL!
                document.getElementById('message').innerHTML = '🎉 Level Complete! +10 points';
                document.getElementById('message').style.background = '#d4edda';
                setTimeout(() => {
                    level++;
                    initGame();
                    document.getElementById('message').innerHTML = '';
                }, 1500);
            }
        }
        
        function newGame() {
            level = 1;
            initGame();
        }
        
        initGame();
    </script>
<script src="/static/js/auto-tracker.js"></script>
</body>
</html>
