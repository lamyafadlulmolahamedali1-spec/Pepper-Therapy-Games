<!DOCTYPE html>
<html>
<head>
    <title>Pepper Therapy - Parent Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 40px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 40px;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .btn {
            padding: 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            transition: 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn:hover {
            transform: scale(1.02);
        }
        .stats {
            margin-top: 40px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Pepper Therapy</h1>
        <div class="subtitle">Parent Dashboard & Analytics</div>
        <div class="buttons">
            <a href="/parent/login" class="btn btn-primary">👨‍👩‍👧 Parent Login</a>
            <a href="/parent/register" class="btn btn-secondary">📝 Parent Register</a>
            <a href="/child/login" class="btn btn-secondary">🧒 Child Login</a>
        </div>
        <div class="stats">
            <p>Track your child's progress | Detailed reports | Analytics</p>
        </div>
    </div>
</body>
</html>
