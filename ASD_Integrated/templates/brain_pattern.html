<!DOCTYPE html>
<html>
<head>
    <title>Pattern Recognition - Complete the Pattern</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 50px;
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 3em;
            margin-bottom: 30px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 30px;
        }
        .pattern-container {
            background: #f0f4f8;
            border-radius: 40px;
            padding: 40px;
            margin: 40px 0;
        }
        .pattern-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
        }
        .pattern-item {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 3px solid #667eea;
        }
        .pattern-item.empty {
            background: #f8f9fa;
            border: 3px dashed #999;
            cursor: pointer;
        }
        .pattern-item.empty:hover {
            border-color: #ffd700;
            transform: scale(1.05);
        }
        .options {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
            flex-wrap: wrap;
        }
        .option-item {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }
        .option-item:hover {
            transform: scale(1.2) rotate(10deg);
        }
        .message {
            text-align: center;
            padding: 20px;
            border-radius: 30px;
            font-size: 1.5em;
            margin: 20px 0;
        }
        .correct {
            background: #d4edda;
            color: #155724;
        }
        .wrong {
            background: #f8d7da;
            color: #721c24;
        }
        button {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.3em;
            cursor: pointer;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Pattern Recognition</h1>
        
        <div class="stats">
            <div>Level: <span id="level">1</span></div>
            <div>Score: <span id="score">0</span></div>
            <div>Correct: <span id="correct">0</span></div>
        </div>
        
        <div class="pattern-container">
            <div class="pattern-row" id="patternRow"></div>
            <div class="options" id="options"></div>
        </div>
        
        <div class="message" id="message"></div>
        
        <div style="text-align: center;">
            <button onclick="nextPattern()">Next Pattern</button>
        </div>
    </div>
    
    <script>
        let level = 1;
        let score = 0;
        let correct = 0;
        let currentPattern = [];
        let correctAnswer = '';
        
        const patterns = [
            // Level 1: Simple color patterns
            {
                pattern: ['🔴', '🔵', '🔴', '?'],
                options: ['🔴', '🔵', '🟢', '🟡'],
                answer: '🔴'
            },
            {
                pattern: ['🟢', '🟢', '🔵', '?'],
                options: ['🔴', '🔵', '🟢', '🟡'],
                answer: '🔵'
            },
            {
                pattern: ['😊', '😊', '😢', '?'],
                options: ['😊', '😢', '😡', '😴'],
                answer: '😢'
            },
            // Level 2: Shape patterns
            {
                pattern: ['⬛', '⬜', '⬛', '?'],
                options: ['⬛', '⬜', '🔲', '🔳'],
                answer: '⬜'
            },
            {
                pattern: ['🔺', '🔺', '🔻', '?'],
                options: ['🔺', '🔻', '⬛', '⬜'],
                answer: '🔻'
            },
            // Level 3: Number patterns
            {
                pattern: ['1️⃣', '2️⃣', '3️⃣', '?'],
                options: ['4️⃣', '5️⃣', '6️⃣', '7️⃣'],
                answer: '4️⃣'
            },
            {
                pattern: ['🔟', '9️⃣', '8️⃣', '?'],
                options: ['7️⃣', '6️⃣', '5️⃣', '4️⃣'],
                answer: '7️⃣'
            },
            // Level 4: Animal patterns
            {
                pattern: ['🐶', '🐱', '🐶', '?'],
                options: ['🐶', '🐱', '🐭', '🐹'],
                answer: '🐱'
            },
            {
                pattern: ['🐘', '🦒', '🐘', '?'],
                options: ['🦒', '🦓', '🦁', '🐯'],
                answer: '🦒'
            }
        ];
        
        function getPatternForLevel() {
            const levelPatterns = patterns.filter((p, i) => i < level * 2);
            return levelPatterns[Math.floor(Math.random() * levelPatterns.length)];
        }
        
        function displayPattern() {
            const patternData = getPatternForLevel();
            currentPattern = patternData.pattern;
            correctAnswer = patternData.answer;
            
            const patternRow = document.getElementById('patternRow');
            patternRow.innerHTML = '';
            
            currentPattern.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'pattern-item';
                if (item === '?') {
                    div.classList.add('empty');
                    div.onclick = () => selectEmpty(index);
                } else {
                    div.textContent = item;
                }
                patternRow.appendChild(div);
            });
            
            // Display options
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            patternData.options.forEach(option => {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.textContent = option;
                div.onclick = () => selectOption(option);
                optionsDiv.appendChild(div);
            });
            
            document.getElementById('message').innerHTML = '';
        }
        
        function selectEmpty(index) {
            document.getElementById('message').innerHTML = 'Choose an option below!';
        }
        
        function selectOption(option) {
            if (option === correctAnswer) {
                // Correct
                score += 10 * level;
                correct++;
                document.getElementById('message').innerHTML = '✅ Correct! Great job!';
                document.getElementById('message').className = 'message correct';
                
                if (correct % 3 === 0) {
                    level++;
                }
                
                // Fill the empty spot
                const emptySpot = document.querySelector('.pattern-item.empty');
                if (emptySpot) {
                    emptySpot.textContent = option;
                    emptySpot.classList.remove('empty');
                }
                
                celebrate();
                
                setTimeout(() => {
                    nextPattern();
                }, 1500);
            } else {
                // Wrong
                score = Math.max(0, score - 5);
                document.getElementById('message').innerHTML = '❌ Try again!';
                document.getElementById('message').className = 'message wrong';
            }
            
            updateStats();
        }
        
        function celebrate() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = `hsl(${Math.random() * 360}, 70%, 50%)`;
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 50);
            }
        }
        
        function nextPattern() {
            displayPattern();
        }
        
        function updateStats() {
            document.getElementById('level').textContent = level;
            document.getElementById('score').textContent = score;
            document.getElementById('correct').textContent = correct;
        }
        
        displayPattern();
    </script>
<script src="/static/js/game-tracker.js"></script>
<script>
    // تهيئة التتبع لهذه اللعبة
    const stats = new GameStats("brain_pattern.html.replace(.html,)");

</script>
<script src="/static/js/auto-tracker.js"></script>
</body>
</html>
