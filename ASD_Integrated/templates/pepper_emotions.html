<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotions Game - ABA Therapy</title>
    <style>
        body { font-family: Arial; background: linear-gradient(135deg, #FF6B6B, #FF8E53); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .game-area { background: white; border-radius: 30px; padding: 30px; text-align: center; }
        .target-box { background: #f0f0f0; border-radius: 50px; padding: 30px; margin: 20px; }
        .target-emoji { font-size: 8em; animation: bounce 2s infinite; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin: 30px; }
        .option-card { background: #f0f0f0; border-radius: 30px; padding: 30px; font-size: 3em; cursor: pointer; transition: all 0.3s; border: 4px solid transparent; }
        .option-card:hover { transform: scale(1.1); background: #e3f2fd; border-color: #4CAF50; }
        .option-card.correct { animation: correctPop 0.5s; background: #4CAF50; }
        @keyframes correctPop { 0%{transform:scale(1)} 50%{transform:scale(1.2)} }
        .score-board { background: #4CAF50; color: white; padding: 15px 30px; border-radius: 30px; }
        .level-badge { background: #FF9800; color: white; padding: 10px 25px; border-radius: 25px; margin-right: 15px; }
        .back-btn { background: #f44336; color: white; padding: 10px 25px; border-radius: 30px; text-decoration: none; }
        .reward { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 4em; background: white; padding: 30px; border-radius: 60px; animation: pop 0.5s; z-index: 1000; }
        @keyframes pop { 0%{transform:translate(-50%,-50%) scale(0)} 100%{transform:translate(-50%,-50%) scale(1)} }
        .prompt-box { background: #FF9800; color: white; padding: 10px; border-radius: 10px; margin: 10px; animation: pulse 1s infinite; }
        @keyframes pulse { 0%{opacity:0.7} 50%{opacity:1} }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <span class="level-badge" id="levelDisplay">Level 1</span>
                <span class="score-board" id="score">0</span>
            </div>
            <h1>😊 Emotions Game</h1>
            <a href="/child/dashboard" class="back-btn">🔙 Back</a>
        </div>
        <div class="game-area">
            <div class="target-box">
                <div class="target-emoji" id="targetEmoji">😊</div>
                <div id="prompt" class="prompt-box">How is Pepper feeling?</div>
            </div>
            <div class="options-grid" id="options"></div>
        </div>
    </div>
    <script>
        const emotions = [
            {emoji:'😊', name:'Happy', action:'smile'},
            {emoji:'😢', name:'Sad', action:'cry'},
            {emoji:'😮', name:'Surprised', action:'wow'},
            {emoji:'😠', name:'Angry', action:'grr'},
            {emoji:'😨', name:'Scared', action:'ahh'},
            {emoji:'😴', name:'Tired', action:'yawn'},
            {emoji:'🤩', name:'Excited', action:'yay'},
            {emoji:'🥰', name:'Loved', action:'love'},
            {emoji:'😎', name:'Cool', action:'cool'},
            {emoji:'🤔', name:'Confused', action:'hmm'}
        ];
        
        let score = 0;
        let level = 1;
        let correctCount = 0;
        
        function playSound(type, word) {
            try {
                const utterances = {
                    correct: ['Great job!','Excellent!','Perfect!','You did it!'],
                    levelUp: ['Level Up!','Amazing!','Super!','Wow!'],
                    prompt: [word + '!', 'It\'s ' + word, 'Pepper is ' + word]
                };
                const msg = new SpeechSynthesisUtterance(utterances[type][Math.floor(Math.random()*4)] || word);
                msg.lang = 'en-US';
                window.speechSynthesis.speak(msg);
            } catch(e) {}
        }
        
        function newRound() {
            const target = emotions[Math.floor(Math.random()*emotions.length)];
            document.getElementById('targetEmoji').textContent = target.emoji;
            document.getElementById('prompt').textContent = `Pepper is feeling... (Level ${level})`;
            
            let opts = [target];
            while(opts.length < 4) {
                let opt = emotions[Math.floor(Math.random()*emotions.length)];
                if(!opts.includes(opt)) opts.push(opt);
            }
            opts.sort(()=>Math.random()-0.5);
            
            document.getElementById('options').innerHTML = opts.map(o => 
                `<div class="option-card" onclick="check('${o.emoji}','${target.emoji}','${o.name}')">
                    <div style="font-size:2em;">${o.emoji}</div>
                    <div>${o.name}</div>
                </div>`
            ).join('');
        }
        
        function check(opt, target, name) {
            if(opt === target) {
                score += 10 * level;
                correctCount++;
                document.getElementById('score').textContent = score;
                showReward('✅ Correct! +' + (10*level));
                playSound('correct', name);
                
                if(correctCount % 3 === 0) {
                    level++;
                    document.getElementById('levelDisplay').textContent = 'Level ' + level;
                    showReward('🌟 Level Up!');
                    playSound('levelUp');
                }
                setTimeout(newRound, 1000);
            } else {
                showReward('❌ Try again');
                playSound('prompt', name);
            }
        }
        
        function showReward(msg) {
            const r = document.createElement('div');
            r.className = 'reward';
            r.textContent = msg;
            document.body.appendChild(r);
            setTimeout(()=>r.remove(), 1500);
        }
        
        newRound();
    </script>
<script src="/static/js/game-tracker.js"></script>
<script>
    // تهيئة التتبع لهذه اللعبة
    const stats = new GameStats("pepper_emotions.html.replace(.html,)");
    // ربط الوظائف: قومي باستدعاء stats.addCorrect() عند الإجابة الصحيحة، و stats.addWrong() عند الإجابة الخاطئة
</script>
<script src="/static/js/auto-tracker.js"></script>
</body>
</html>
